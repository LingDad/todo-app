  <script>
    const input  = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const list   = document.getElementById('todoList');
    const exportWeeklyBtn = document.getElementById('exportWeeklyBtn');

    // ── Height map ───────────────────────────────────────────────
    // heightMap[i] = top-y of the pile surface at column i*CELL.
    // Starts at window.innerHeight (bare floor).
    const CELL = 4;
    let heightMap    = [];
    let heightMapDirty = false;   // set true when settled letters are un-settled by wind

    function initHeightMap() {
      heightMap = new Array(Math.ceil(window.innerWidth / CELL) + 4).fill(window.innerHeight);
    }
    initHeightMap();
    window.addEventListener('resize', initHeightMap);

    function getFloorAt(x, w) {
      const s = Math.max(0, Math.floor(x / CELL));
      const e = Math.min(heightMap.length - 1, Math.ceil((x + w) / CELL));
      let h = window.innerHeight;
      for (let i = s; i <= e; i++) h = Math.min(h, heightMap[i]);
      return h;
    }
    function raiseFloor(x, w, y) {
      const s = Math.max(0, Math.floor((x - 2) / CELL));
      const e = Math.min(heightMap.length - 1, Math.ceil((x + w + 2) / CELL));
      for (let i = s; i <= e; i++) heightMap[i] = Math.min(heightMap[i], y);
    }
    // Full rebuild from all currently-settled letters (called when wind dislodges letters)
    function rebuildHeightMap() {
      initHeightMap();
      for (const p of allParticles)
        if (p.settled && !p.gone) raiseFloor(p.x, p.w, p.y);
    }

    // Smooth local surface slope at screen-x = cx (averaged over SLOPE_R cells each side)
    const SLOPE_R = 6;
    function slopeAt(cx) {
      const ci = Math.round(cx / CELL);
      let sum = 0;
      for (let k = 1; k <= SLOPE_R; k++) {
        const il = Math.max(0, ci - k);
        const ir = Math.min(heightMap.length - 1, ci + k);
        sum += (heightMap[ir] - heightMap[il]) / (2 * k * CELL);
      }
      return Math.max(-2.5, Math.min(2.5, sum / SLOPE_R));
    }

    // ── Vacuum / suction state ───────────────────────────────────
    let vacOn           = false;
    let vacuumStrength  = 0;
    const VAC_POWER     = 22.0;
    const VAC_RAMP_UP   = 1 / (60 * 0.55);
    const VAC_RAMP_DOWN = 1 / (60 * 0.45);

    // ── Tornado / vortex state ───────────────────────────────────
    let torOn = false, torStrength = 0;
    let torX  = window.innerWidth * 0.38, torY = window.innerHeight * 0.55;
    const TOR_POWER      = 24.0;
    const TOR_RAMP_UP    = 1 / (60 * 0.5);
    const TOR_RAMP_DOWN  = 1 / (60 * 0.7);
    const TOR_RADIUS     = 350;   // px — how far the vortex pulls
    const TOR_TIP_OFFSET = 70;    // px below element centre where suction point sits

    // Nozzle mouth screen position — computed by buildVacSvg(), stored here
    let _vacNX = 200, _vacNY = 0;
    const vacNozzleX = () => _vacNX;
    const vacNozzleY = () => _vacNY;

    // ── Build vacuum SVG geometry dynamically ─────────────────────
    // Machine body sits in the bottom-right corner; hose sweeps to the bottom-centre
    // where letters pile up, placing the nozzle just above the floor.
    function buildVacSvg() {
      const W  = window.innerWidth,  H = window.innerHeight;

      // Scale everything down on narrow screens
      const sc = Math.min(1, W / 780);

      // Body dimensions (screen px)
      const BW = Math.round(130 * sc), BH = Math.round(76 * sc);
      // Body top-left corner
      const wR0 = Math.round(16 * sc);  // wheel radius (needed for floor placement)
      const BX  = W - BW - 14, BY = H - BH - 2 * wR0 + 4;
      // Hose port: left-centre of body
      const portX = BX,       portY = BY + BH * 0.5 - 4;
      // Nozzle target: 60% across screen, resting on floor
      const nozX  = W * 0.60;
      const nozY  = H - 18;
      const nozW  = Math.round(80 * sc), nozH = Math.round(20 * sc);
      // Nozzle mouth is the LEFT end (faces left toward letter pile)
      _vacNX = nozX;
      _vacNY = nozY + nozH * 0.5;

      // Hose bezier: port → nozzle-collar
      const nozColX = nozX + nozW * 0.5, nozColY = nozY;
      const cp1x = portX - Math.round(60 * sc),  cp1y = portY + Math.round(80 * sc);
      const cp2x = nozColX + Math.round(40 * sc), cp2y = nozColY - Math.round(100 * sc);
      const hoseD = `M ${portX} ${portY} C ${cp1x} ${cp1y} ${cp2x} ${cp2y} ${nozColX} ${nozColY}`;

      function set(id, attrs) {
        const el = document.getElementById(id);
        if (!el) return;
        Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      }

      // Hose
      const hw = Math.round(14 * sc);
      ['vacHoseShadow','vacHoseOuter','vacHoseSheen','vacHoseInner'].forEach(id => set(id, {d: hoseD}));
      set('vacHoseShadow', {d: hoseD, 'stroke-width': hw + 4});
      set('vacHoseOuter',  {d: hoseD, 'stroke-width': hw});
      set('vacHoseSheen',  {d: hoseD, 'stroke-width': hw * 0.45});
      set('vacHoseInner',  {d: hoseD, 'stroke-width': hw * 0.32});

      // Nozzle (horizontal bar at bottom, mouth on right side facing letters)
      const ns = {x: nozX, y: nozY, w: nozW, h: nozH};
      set('vacNozzleShadow', {x: ns.x+3, y: ns.y+3, width: ns.w, height: ns.h});
      set('vacNozzleBody',   {x: ns.x,   y: ns.y,   width: ns.w, height: ns.h});
      set('vacNozzleSheen',  {x: ns.x+2, y: ns.y+2, width: ns.w-4, height: ns.h*0.38});
      // Mouth opening on left end (faces left toward letter pile)
      set('vacNozzleMouth',  {x: ns.x-2, y: ns.y+2, width: 12, height: ns.h-4});
      set('vacNozzleGlow',   {cx: ns.x-2, cy: ns.y+ns.h*0.5, r: 18});
      // Collar where hose meets nozzle (top-centre)
      const cR = Math.round(12 * sc);
      set('vacNozzleCollar1', {cx: nozColX, cy: nozColY+2, r: cR});
      set('vacNozzleCollar2', {cx: nozColX, cy: nozColY+2, r: Math.round(cR*0.5)});

      // Wheels
      const wR = wR0;
      set('vacWheel1', {cx: BX + BW*0.28, cy: BY + BH + wR - 4, r: wR});
      set('vacWheel2', {cx: BX + BW*0.72, cy: BY + BH + wR - 4, r: wR});
      set('vacAxle1',  {cx: BX + BW*0.28, cy: BY + BH + wR - 4, r: Math.max(3, Math.round(6*sc))});
      set('vacAxle2',  {cx: BX + BW*0.72, cy: BY + BH + wR - 4, r: Math.max(3, Math.round(6*sc))});

      // Body — scale rx so rounded corners stay proportional
      const bRx = Math.round(27 * sc);
      set('vacBodyShadow', {x: BX+3, y: BY+5, width: BW, height: BH, rx: bRx});
      set('vacBody',       {x: BX,   y: BY,   width: BW, height: BH, rx: bRx});
      set('vacBodySheen',  {x: BX+Math.round(14*sc), y: BY+5, width: BW*0.56, height: BH*0.36});

      // Vents (right side of body — 3 vertical lines)
      const vg = document.getElementById('vacVents');
      if (vg) {
        vg.innerHTML = '';
        // Keep vents away from rounded corners — anchor near right-centre of body
        const vgap = Math.round(7 * sc);
        const vx0  = BX + BW - bRx - Math.round(6*sc);  // rightmost safe x
        [0,1,2].forEach(i => {
          const l = document.createElementNS('http://www.w3.org/2000/svg','line');
          const vx = vx0 - i * vgap;
          l.setAttribute('x1', vx); l.setAttribute('x2', vx);
          l.setAttribute('y1', BY+Math.round(10*sc)); l.setAttribute('y2', BY+BH-Math.round(10*sc));
          vg.appendChild(l);
        });
      }

      // Label
      const lbW = Math.round(50*sc), lbH = Math.round(18*sc);
      set('vacLabelBg',  {x: BX+BW*0.25, y: BY+BH*0.42, width: lbW, height: lbH});
      set('vacLabelTxt', {x: BX+BW*0.25+lbW/2, y: BY+BH*0.42+lbH*0.76, 'font-size': Math.round(8*sc)});

      // Port
      const pR = Math.round(12 * sc);
      set('vacPort1', {cx: portX, cy: portY, r: pR});
      set('vacPort2', {cx: portX, cy: portY, r: Math.round(pR*0.5)});

      // Power button (right side of body)
      const btnR = Math.round(14 * sc);
      const btnCX = BX + BW - Math.round(18*sc), btnCY = BY + BH*0.5;
      set('vacBtn',     {cx: btnCX, cy: btnCY, r: btnR});
      set('vacBtnRing', {cx: btnCX, cy: btnCY, r: btnR});

    }

    buildVacSvg();
    window.addEventListener('resize', buildVacSvg);

    // ── Fan / wind state ─────────────────────────────────────────
    let fanOn        = false;
    let windRamping  = false;       // true only after head has finished turning
    let windStrength = 0;           // 0..1, ramped each frame
    const WIND_RAMP_UP   = 1 / (60 * 0.4);   // full strength in ~0.4 s
    const WIND_RAMP_DOWN = 1 / (60 * 0.6);   // zero in ~0.6 s
    const WIND_POWER     = 2.8;

    // Approximate screen position of the fan's centre (fixed widget, bottom-right)
    const fanCX = () => window.innerWidth  - 83;
    const fanCY = () => window.innerHeight - 92;    // fan at bottom: 0, centre ~92px up

    // ── Particle physics constants ───────────────────────────────
    const GRAVITY  = 0.52;    // px / frame²
    const TERM_VY  = 22;      // terminal fall speed
    const SUBSTEPS = 3;
    const DT       = 1 / SUBSTEPS;
    const ROT_DAMP = Math.pow(0.965, DT);   // per-substep rotational damping

    const allParticles = [];
    let   loopRunning  = false;

    // ── Spawn one letter particle ─────────────────────────────────
    function spawnLetter(cd) {
      const el = document.createElement('div');
      el.className  = 'falling-letter';
      el.textContent = cd.char;
      el.style.left  = cd.x + 'px';
      el.style.top   = cd.y + 'px';
      document.body.appendChild(el);
      return {
        el,
        x: cd.x, y: cd.y, w: cd.w, h: cd.h,
        vx: (Math.random() - 0.5) * 9,
        vy: -(1 + Math.random() * 3),         // upward burst on completion
        vr: (Math.random() - 0.5) * 18,
        rot: 0,
        drag:        0.008 + Math.random() * 0.010,  // per-letter air-resistance variety
        restitution: 0.55  + Math.random() * 0.13,
        mu:          0.48  + Math.random() * 0.36,
        sleepN: 0,
        settled:  false,
        gone:     false,
        airborne: true,
      };
    }

    // ── Single integration substep ────────────────────────────────
    function substep(p) {

      // ① Wind — applied before everything so it pre-loads momentum
      if (windStrength > 0) {
        const cx = p.x + p.w * 0.5,  cy = p.y + p.h * 0.5;
        const dx = cx - fanCX(),      dy = cy - fanCY();
        const dist   = Math.max(1, Math.hypot(dx, dy));
        const wf     = WIND_POWER * windStrength * DT / (1 + dist * 0.002);
        const vAtten = Math.exp(-Math.abs(dy) * 0.002);  // fan blows mostly sideways
        const turb   = wf * 0.35;
        p.vx += (dx / dist) * wf * 1.5 + (Math.random() - 0.5) * turb;
        p.vy += (dy / dist) * wf * 0.3 * vAtten + (Math.random() - 0.5) * turb * 0.5;
        if (p.settled) { p.settled = false; heightMapDirty = true; }
      }

      // ①b Vacuum suction — attracts letters toward nozzle with a vortex swirl
      if (vacuumStrength > 0) {
        const cx = p.x + p.w * 0.5,  cy = p.y + p.h * 0.5;
        const dx = vacNozzleX() - cx,  dy = vacNozzleY() - cy;
        const dist = Math.max(1, Math.hypot(dx, dy));
        const sf   = VAC_POWER * vacuumStrength * DT / (0.5 + dist * 0.004);
        p.vx += (dx / dist) * sf;
        p.vy += (dy / dist) * sf;
        // Tangential swirl so letters spiral in
        p.vx += (-dy / dist) * sf * 0.22;
        p.vy += ( dx / dist) * sf * 0.22;
        p.vr -= sf * 9;   // spin up as letter approaches
        if (p.settled) { p.settled = false; heightMapDirty = true; }
      }

      // ①c Tornado vortex — CCW swirl + fling when letters enter the eye
      if (torStrength > 0) {
        const cx = p.x + p.w * 0.5,  cy = p.y + p.h * 0.5;
        const tx = torX,  ty = torY + TOR_TIP_OFFSET;
        const dx = tx - cx,  dy = ty - cy;
        const dist = Math.max(1, Math.hypot(dx, dy));
        if (dist < TOR_RADIUS) {
          const sf = TOR_POWER * torStrength * DT / (0.5 + dist * 0.003);
          // Gentle radial pull
          p.vx += (dx / dist) * sf * 0.35;
          p.vy += (dy / dist) * sf * 0.35;
          // Strong CCW tangential swirl (visually counter-clockwise on screen)
          p.vx += ( dy / dist) * sf * 1.65;
          p.vy += (-dx / dist) * sf * 1.65;
          p.vr += sf * 14;
          // Letters entering the eye get thrown upward and radially outward
          if (dist < 55) {
            p.vx += (-dx / dist) * torStrength * 10;
            p.vy -= torStrength * 16;
          }
          if (p.settled) { p.settled = false; heightMapDirty = true; }
        }
      }

      // ② Quadratic air drag (F proportional to v²) — paper-flutter feel
      const speed = Math.hypot(p.vx, p.vy);
      if (speed > 0.05) {
        const q = Math.min(0.45, p.drag * speed * DT);
        p.vx *= (1 - q);
        p.vy *= (1 - q);
      }

      // ③ Gravity + terminal velocity
      p.vy = Math.min(p.vy + GRAVITY * DT, TERM_VY);

      // ④ Semi-implicit Euler integration
      p.x += p.vx * DT;
      p.y += p.vy * DT;

      // ⑤ Rotation with fractional damping
      p.rot += p.vr * DT;
      p.vr  *= ROT_DAMP;

      // ⑥ Top edge: tornado-flung letters escape off the top
      if (torStrength > 0 && p.y + p.h < -80) { p.el.remove(); p.gone = true; return; }

      // Left edge: letters blown by fan escape off-screen; others bounce
      if (p.x + p.w < -40) { p.el.remove(); p.gone = true; return; }
      if (!fanOn && p.x < 0) {
        p.x  = 0;
        p.vx = Math.abs(p.vx) * p.restitution;
        p.vr -= p.vy * 0.12;
      }

      // ⑦ Right wall — always bounces (fan is there)
      if (p.x + p.w > window.innerWidth) {
        p.x  = window.innerWidth - p.w;
        p.vx = -Math.abs(p.vx) * p.restitution;
        p.vr += p.vy * 0.12;
      }

      // ⑧ Surface collision with slope-aware normal decomposition
      const surface = getFloorAt(p.x, p.w);
      if (p.y + p.h < surface) { p.airborne = true; p.sleepN = 0; return; }   // airborne

      p.y = surface - p.h;   // place on surface

      // Outward normal: N = (slope, -1) / |N|   (points "up" in screen space)
      const slp  = slopeAt(p.x + p.w * 0.5);
      const nLen = Math.hypot(slp, 1);
      const nx   = slp / nLen,  ny = -1 / nLen;
      const vn   = p.vx * nx + p.vy * ny;   // normal velocity (negative = hitting surface)

      const wasAirborne = p.airborne;
      p.airborne = false;

      if (vn < 0) {
        if (wasAirborne) playLand(-vn, surface < window.innerHeight - 8);
        const j = -(1 + p.restitution) * vn;
        p.vx += j * nx;
        p.vy += j * ny;
        // Coulomb friction along surface tangent  T = (1, slope) / |N|
        const tx = 1 / nLen,  ty = slp / nLen;
        const vt = p.vx * tx + p.vy * ty;
        const fj = vt * (1 - p.mu);
        p.vx -= fj * tx;
        p.vy -= fj * ty;
        // Tangential contact → spin coupling
        p.vr += vt * 0.55;
        p.vr *= (0.60 + p.mu * 0.28);
      }

      // ⑨ Sleep — freeze only when wind, vacuum AND tornado are negligible AND energy tiny
      if (windStrength < 0.01 && vacuumStrength < 0.01 && torStrength < 0.01) {
        const E = p.vx * p.vx + p.vy * p.vy + Math.abs(p.vr) * 0.06;
        if (E < 0.10) {
          if (++p.sleepN >= 5 * SUBSTEPS) {
            p.vx = p.vy = p.vr = 0;
            p.y  = surface - p.h;
            p.settled = true;
            raiseFloor(p.x, p.w, p.y);
          }
        } else { p.sleepN = 0; }
      } else {
        p.sleepN = 0;   // never freeze while wind, vacuum, or tornado is active
      }
    }

    // ── Shared animation loop ─────────────────────────────────────
    function ensureLoop() {
      if (loopRunning) return;
      loopRunning = true;

      function tick() {
        // Ramp wind strength — only after head has finished turning (windRamping flag)
        if      (fanOn && windRamping  && windStrength < 1) windStrength = Math.min(1, windStrength + WIND_RAMP_UP);
        else if ((!fanOn || !windRamping) && windStrength > 0) windStrength = Math.max(0, windStrength - WIND_RAMP_DOWN);
        setWind(windStrength);

        // Vacuum ramp
        if      (vacOn && vacuumStrength < 1) vacuumStrength = Math.min(1, vacuumStrength + VAC_RAMP_UP);
        else if (!vacOn && vacuumStrength > 0) vacuumStrength = Math.max(0, vacuumStrength - VAC_RAMP_DOWN);
        setVacuumGain(vacuumStrength);

        // Tornado ramp
        if      (torOn && torStrength < 1) torStrength = Math.min(1, torStrength + TOR_RAMP_UP);
        else if (!torOn && torStrength > 0) torStrength = Math.max(0, torStrength - TOR_RAMP_DOWN);
        setTornadoGain(torStrength);

        // Rebuild height map when letters were dislodged by wind
        if (heightMapDirty) { rebuildHeightMap(); heightMapDirty = false; }

        // Wind pre-pass: un-settle resting letters so they enter the physics loop.
        // Closer letters to the fan get dislodged first (gradual cascade effect).
        // Only runs while fan is actively blowing — not during the ramp-down after
        // the fan is switched off, so letters stay where physics left them.
        if (windStrength > 0 && windRamping) {
          const fcx = fanCX(), fcy = fanCY();
          for (const p of allParticles) {
            if (!p.settled || p.gone) continue;
            const dist = Math.hypot(p.x + p.w * 0.5 - fcx, p.y + p.h * 0.5 - fcy);
            const wf   = WIND_POWER * windStrength / (1 + dist * 0.002);
            if (wf > 0.02) { p.settled = false; heightMapDirty = true; }
          }
        }

        // Vacuum pre-pass: dislodge settled letters within suction range
        if (vacuumStrength > 0) {
          const nx = vacNozzleX(), ny = vacNozzleY();
          for (const p of allParticles) {
            if (!p.settled || p.gone) continue;
            if (Math.hypot(p.x + p.w * 0.5 - nx, p.y + p.h * 0.5 - ny) < 420) {
              p.settled = false; heightMapDirty = true;
            }
          }
        }

        // Tornado pre-pass: dislodge settled letters within vortex range
        if (torStrength > 0) {
          const tipX = torX, tipY = torY + TOR_TIP_OFFSET;
          for (const p of allParticles) {
            if (!p.settled || p.gone) continue;
            if (Math.hypot(p.x + p.w * 0.5 - tipX, p.y + p.h * 0.5 - tipY) < TOR_RADIUS) {
              p.settled = false; heightMapDirty = true;
            }
          }
        }

        let anyActive = false;
        for (const p of allParticles) {
          if (p.settled || p.gone) continue;
          for (let i = 0; i < SUBSTEPS; i++) {
            substep(p);
            if (p.settled || p.gone) break;
          }
          if (p.gone) continue;
          p.el.style.left = p.x + 'px';
          p.el.style.top  = p.y + 'px';

          // Shrink letters as they approach the nozzle; absorb at threshold
          let renderScale = 1;
          if (vacuumStrength > 0) {
            const nd = Math.hypot(p.x + p.w * 0.5 - vacNozzleX(),
                                  p.y + p.h * 0.5 - vacNozzleY());
            if (nd < 72) {
              renderScale = Math.max(0.04, nd / 72);
              if (nd < 18) {   // absorbed into nozzle
                p.el.style.opacity = '0';
                setTimeout(() => p.el.remove(), 80);
                p.gone = true; heightMapDirty = true;
                _noise(0.05, 0.03, 5000, 2.5, 'highpass');  // tiny pop
                continue;
              }
            }
          }

          p.el.style.transform = renderScale < 1
            ? `rotate(${p.rot}deg) scale(${renderScale.toFixed(3)})`
            : `rotate(${p.rot}deg)`;
          if (!p.settled) anyActive = true;
        }

        // Check if letters fall into the trash bin
        checkTrashAbsorb();

        // Keep loop alive while wind/vacuum is active or letters are still moving
        if (anyActive || windStrength > 0 || (fanOn && windRamping) || vacuumStrength > 0 || torStrength > 0) requestAnimationFrame(tick);
        else loopRunning = false;
      }

      requestAnimationFrame(tick);
    }

    // ── Fan button ────────────────────────────────────────────────
    const fanBtn      = document.getElementById('fanBtn');
    const bladesGroup = document.getElementById('bladesGroup');
    const fanHead     = document.getElementById('fanHead');

    fanBtn.addEventListener('click', () => {
      fanOn = !fanOn;
      fanBtn.classList.toggle('on', fanOn);
      playFanSwitch(fanOn);

      if (fanOn) {
        _initWind();
        // ① Blades spin up (slow → fast)
        bladesGroup.style.cssText =
          'animation-name:fanSpin;animation-timing-function:linear;' +
          'animation-iteration-count:infinite;animation-duration:0.55s;' +
          'transform-box:fill-box;transform-origin:center';
        setTimeout(() => { if (fanOn) bladesGroup.style.animationDuration = '0.17s'; }, 460);

        // ② Head sweeps in two stages: first partial turn (scanning), then locks onto pile
        fanHead.style.transition = 'transform 0.65s cubic-bezier(0.4,0,0.2,1)';
        fanHead.style.transform  = 'rotateY(-20deg)';          // stage 1 — starts swinging left
        setTimeout(() => {
          if (!fanOn) return;
          fanHead.style.transition = 'transform 1.1s cubic-bezier(0.35,0,0.15,1)';
          fanHead.style.transform  = 'rotateY(-58deg)';         // stage 2 — locks onto pile
        }, 680);

        // ③ Wind starts only after the head has fully aimed at the pile
        setTimeout(() => { if (fanOn) { windRamping = true; ensureLoop(); } }, 1550);
        ensureLoop(); // keep physics ticking for any airborne letters during the delay

      } else {
        windRamping = false;   // stop wind immediately when button pressed

        // Head returns to resting forward position
        fanHead.style.transition = 'transform 1.5s cubic-bezier(0.4,0,0.2,1)';
        fanHead.style.transform  = 'rotateY(0deg)';

        // Blades spin down
        bladesGroup.style.animationDuration = '0.62s';
        setTimeout(() => { if (!fanOn) bladesGroup.style.animationName = 'none'; }, 750);

        // Auto-hide widget and restore FAB (only when widget is still visible,
        // i.e. user pressed the button — not when deactivateCurrentTool hid it first)
        if (fanWidget.style.display !== 'none') {
          fanWidget.style.display = 'none';
          toptFan.classList.remove('active');
          activeTool = null;
          setLauncher(true);
        }
      }
    });

    // ══════════════════════════════════════════════════════════════
    // ── Web Audio Engine ─────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════
    const AC  = new (window.AudioContext || window.webkitAudioContext)();
    const _out = (() => {
      const g = AC.createGain(); g.gain.value = 0.78; g.connect(AC.destination); return g;
    })();

    // Short oscillator tone (freq Hz, vol 0-1, dur seconds, wave type)
    function _tone(freq, vol, dur, type = 'sine') {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
      o.connect(g); g.connect(_out); o.start(); o.stop(AC.currentTime + dur + 0.01);
    }

    // Short noise burst with filter
    function _noise(vol, dur, fq = 800, q = 1, tp = 'lowpass') {
      const len = Math.ceil(AC.sampleRate * Math.min(dur, 0.5));
      const buf = AC.createBuffer(1, len, AC.sampleRate);
      const d   = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      const s = AC.createBufferSource(), f = AC.createBiquadFilter(), g = AC.createGain();
      s.buffer = buf; f.type = tp; f.frequency.value = fq; f.Q.value = q;
      g.gain.setValueAtTime(vol, AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
      s.connect(f); f.connect(g); g.connect(_out); s.start(); s.stop(AC.currentTime + dur + 0.01);
    }

    // ① Task check — ascending ding (like a typewriter bell)
    function playCheck() {
      if (AC.state === 'suspended') AC.resume();
      _noise(0.06, 0.018, 4500);
      _tone(587, 0.18, 0.22);
      setTimeout(() => _tone(880, 0.12, 0.32), 75);
    }

    // ② Letter landing — floor thud vs. paper-on-paper crinkle
    let _landClock = 0;
    function playLand(impact, onLetters) {
      if (impact < 1.5) return;
      const now = AC.currentTime;
      if (now - _landClock < 0.038) return;   // throttle: max ~26 sounds/s
      _landClock = now;
      const vol = Math.min(0.20, impact * 0.012);
      if (onLetters) {
        _noise(vol, 0.055, 2200, 1.8, 'bandpass');   // crisp paper-on-paper
      } else {
        _noise(vol * 0.85, 0.07, 320, 1);             // dull thud
        _tone(95, vol * 0.30, 0.055);                  // bass resonance
      }
    }

    // ③ Fan power switch — hard click + motor spin-up or spin-down
    function playFanSwitch(on) {
      if (AC.state === 'suspended') AC.resume();
      _noise(0.38, 0.016, 5500, 1.5);           // mechanical click
      const t = AC.currentTime + 0.02;
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(on ? 45 : 160, t);
      o.frequency.exponentialRampToValueAtTime(on ? 190 : 38, t + 0.75);
      g.gain.setValueAtTime(0.065, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.78);
      o.connect(g); g.connect(_out); o.start(t); o.stop(t + 0.80);
    }

    // ④ Wind ambient — looped brownian noise, gain tracks windStrength
    let _wGain = null;
    function _initWind() {
      if (_wGain) return;
      const rate = AC.sampleRate, len = rate * 4;
      const buf = AC.createBuffer(1, len, rate);
      const d   = buf.getChannelData(0);
      let b = 0, mx = 0;
      for (let i = 0; i < len; i++) {
        b = b * 0.993 + (Math.random() - 0.5) * 0.062;
        d[i] = b; mx = Math.max(mx, Math.abs(b));
      }
      if (mx > 0) for (let i = 0; i < len; i++) d[i] /= mx;   // normalise
      const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
      const lp  = AC.createBiquadFilter(); lp.type  = 'lowpass';  lp.frequency.value = 1100;
      const hp  = AC.createBiquadFilter(); hp.type  = 'highpass'; hp.frequency.value = 160;
      _wGain = AC.createGain(); _wGain.gain.value = 0;
      src.connect(lp); lp.connect(hp); hp.connect(_wGain); _wGain.connect(_out);
      src.start();
    }
    function setWind(s) {
      if (_wGain) _wGain.gain.setTargetAtTime(s * 0.15, AC.currentTime, 0.28);
    }

    // ⑤ Vacuum motor sound — higher-pitched bandpass noise
    let _vacGain = null;
    function _initVacuumSound() {
      if (_vacGain) return;
      const rate = AC.sampleRate, len = rate * 3;
      const buf  = AC.createBuffer(1, len, rate);
      const d    = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;   // white noise
      const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
      const lp  = AC.createBiquadFilter(); lp.type  = 'lowpass';  lp.frequency.value = 2200;
      const hp  = AC.createBiquadFilter(); hp.type  = 'highpass'; hp.frequency.value = 600;
      _vacGain = AC.createGain(); _vacGain.gain.value = 0;
      src.connect(lp); lp.connect(hp); hp.connect(_vacGain); _vacGain.connect(_out);
      src.start();
    }
    function setVacuumGain(s) {
      if (_vacGain) _vacGain.gain.setTargetAtTime(s * 0.19, AC.currentTime, 0.22);
    }

    // ⑦ Tornado rumble — deep brownian noise lowpassed to a sub-bass growl
    let _torGain = null;
    function _initTornadoSound() {
      if (_torGain) return;
      if (AC.state === 'suspended') AC.resume();
      const rate = AC.sampleRate, len = rate * 6;
      const buf  = AC.createBuffer(1, len, rate);
      const d    = buf.getChannelData(0);
      let b = 0, mx = 0;
      for (let i = 0; i < len; i++) {
        b = b * 0.9986 + (Math.random() - 0.5) * 0.020;
        d[i] = b; mx = Math.max(mx, Math.abs(b));
      }
      if (mx > 0) for (let i = 0; i < len; i++) d[i] /= mx;
      const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
      const lp1 = AC.createBiquadFilter(); lp1.type = 'lowpass';  lp1.frequency.value = 110;
      const lp2 = AC.createBiquadFilter(); lp2.type = 'lowpass';  lp2.frequency.value = 280;
      _torGain  = AC.createGain(); _torGain.gain.value = 0;
      src.connect(lp1); lp1.connect(lp2); lp2.connect(_torGain); _torGain.connect(_out);
      src.start();
    }
    function setTornadoGain(s) {
      if (_torGain) _torGain.gain.setTargetAtTime(s * 0.36, AC.currentTime, 0.32);
    }
    function playTorSwitch(on) {
      if (AC.state === 'suspended') AC.resume();
      _noise(0.22, 0.022, 2400, 1.0);
      const t = AC.currentTime + 0.02;
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(on ? 28 : 110, t);
      o.frequency.exponentialRampToValueAtTime(on ? 110 : 22, t + 0.78);
      g.gain.setValueAtTime(0.09, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.80);
      o.connect(g); g.connect(_out); o.start(t); o.stop(t + 0.82);
    }

    // ⑥ Vacuum switch — sharper electric click + higher-frequency spin
    function playVacuumSwitch(on) {
      if (AC.state === 'suspended') AC.resume();
      _noise(0.32, 0.014, 7000, 2);            // hard electric click
      const t = AC.currentTime + 0.015;
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(on ? 55 : 300, t);
      o.frequency.exponentialRampToValueAtTime(on ? 320 : 48, t + 0.52);
      g.gain.setValueAtTime(0.07, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.54);
      o.connect(g); g.connect(_out); o.start(t); o.stop(t + 0.55);
    }

    // ── Vacuum button ─────────────────────────────────────────────
    const vacBtn      = document.getElementById('vacBtn');
    const vacuumWidget = document.getElementById('vacuumWidget');

    vacBtn.addEventListener('click', () => {
      vacOn = !vacOn;
      _initVacuumSound();
      playVacuumSwitch(vacOn);
      vacBtn.setAttribute('fill', `url(#${vacOn ? 'vbon' : 'vboff'})`);
      vacuumWidget.classList.toggle('vac-on', vacOn);
      ensureLoop();

      // Auto-hide widget and restore FAB when turned off
      if (!vacOn && vacuumWidget.style.display !== 'none') {
        vacuumWidget.style.display = 'none';
        toptVac.classList.remove('active');
        activeTool = null;
        setLauncher(true);
      }
    });

    // ── Tornado button + drag ─────────────────────────────────────
    const torBtn        = document.getElementById('torBtn');
    const tornadoWidget = document.getElementById('tornadoWidget');
    const torCore       = document.getElementById('torCore');

    function positionTorCore() {
      torCore.style.left = torX + 'px';
      torCore.style.top  = torY + 'px';
    }

    // ── Tornado canvas particle renderer ─────────────────────────
    const torCanvas = document.getElementById('torCanvas');
    const torCtx    = torCanvas.getContext('2d');

    const TOR_VIS_H   = 310;   // visual height: tip → cloud top (px)
    const TOR_R_TIP   = 5;     // funnel radius at tip (px)
    const TOR_R_CLOUD = 108;   // funnel radius at cloud (px)

    // Build two pools of particles: atmospheric swirl (blue-grey) + ground debris (brown)
    function _makePart(isDebris) {
      return {
        t:      isDebris ? Math.random() * 0.35 : Math.random(),
        angle:  Math.random() * Math.PI * 2,
        speed:  (isDebris ? 0.048 : 0.030) + Math.random() * 0.028,
        drift:  (isDebris ? 0.00065 : 0.00048) + Math.random() * 0.00050,
        size:   isDebris ? 2.2 + Math.random() * 3.5 : 1.1 + Math.random() * 2.6,
        alpha:  (isDebris ? 0.55 : 0.32) + Math.random() * 0.42,
        hue:    isDebris ? 22 + Math.random() * 28 : 200 + Math.random() * 50,
        sat:    isDebris ? 28 + Math.random() * 28 : 6  + Math.random() * 18,
        debris: isDebris,
      };
    }
    const _torParts = [
      ...Array.from({length: 260}, () => _makePart(false)),
      ...Array.from({length:  35}, () => _makePart(true)),
    ];

    function _resizeTorCanvas() {
      torCanvas.width  = window.innerWidth;
      torCanvas.height = window.innerHeight;
    }
    _resizeTorCanvas();
    window.addEventListener('resize', _resizeTorCanvas);

    let _torRafId = null;
    let _torVis   = 0;   // visual strength, smoothly tracks torStrength

    function _drawTornado() {
      const W = torCanvas.width, H = torCanvas.height;
      const tipX = torX, tipY = torY + TOR_TIP_OFFSET;

      // Clear to transparent so todo content shows through
      torCtx.clearRect(0, 0, W, H);

      if (_torVis < 0.005) return;

      const spd = 0.6 + _torVis * 2.6;   // animation speed multiplier

      for (const p of _torParts) {
        // Rotate faster near tip, slower near cloud
        p.angle += p.speed * spd * (1 + (1 - p.t) * 1.9);
        // Drift upward; reset to tip when reaching the cloud
        p.t += p.drift * spd;
        if (p.t > 1.0) { p.t = Math.random() * 0.04; p.angle = Math.random() * Math.PI * 2; }

        const r  = TOR_R_TIP + (TOR_R_CLOUD - TOR_R_TIP) * p.t;
        const px = tipX + Math.sin(p.angle) * r;
        // Slight fore-shortening so the funnel looks 3-D
        const py = tipY - p.t * TOR_VIS_H + Math.cos(p.angle) * r * 0.13;

        const L   = 22 + p.t * 48;          // dark at tip, light at cloud
        const alp = p.alpha * _torVis * (0.35 + p.t * 0.65);
        torCtx.beginPath();
        torCtx.arc(px, py, p.size * (0.65 + p.t * 0.55), 0, Math.PI * 2);
        torCtx.fillStyle = `hsla(${p.hue},${p.sat}%,${L}%,${alp.toFixed(2)})`;
        torCtx.fill();
      }

      // Ground dust: radial gradient ellipse at the tip
      const dustA = _torVis * 0.38;
      const dg = torCtx.createRadialGradient(tipX, tipY, 0, tipX, tipY, 50);
      dg.addColorStop(0, `rgba(110,90,65,${dustA})`);
      dg.addColorStop(1, 'rgba(110,90,65,0)');
      torCtx.beginPath();
      torCtx.ellipse(tipX, tipY, 50, 15, 0, 0, Math.PI * 2);
      torCtx.fillStyle = dg;
      torCtx.fill();

      // Cloud puffs at the crown
      const cloudY = tipY - TOR_VIS_H;
      const puffData = [[-30,6,40,0.62],[0,-10,52,0.55],[28,4,36,0.58]];
      for (const [ox, oy, cr, oa] of puffData) {
        const cg = torCtx.createRadialGradient(tipX+ox, cloudY+oy, 0, tipX+ox, cloudY+oy, cr);
        cg.addColorStop(0, `rgba(195,188,225,${oa * _torVis})`);
        cg.addColorStop(1, 'rgba(195,188,225,0)');
        torCtx.beginPath();
        torCtx.ellipse(tipX+ox, cloudY+oy, cr, cr*0.62, 0, 0, Math.PI * 2);
        torCtx.fillStyle = cg;
        torCtx.fill();
      }
    }

    function _torLoop() {
      // Smoothly ramp visual strength toward physics torStrength
      _torVis += (torStrength - _torVis) * 0.07;
      if (!torOn && _torVis < 0.006) _torVis = 0;

      _drawTornado();

      if (tornadoWidget.style.display !== 'none') {
        _torRafId = requestAnimationFrame(_torLoop);
      } else {
        _torRafId = null;
        torCtx.clearRect(0, 0, torCanvas.width, torCanvas.height);
      }
    }

    function startTorCanvas() {
      _resizeTorCanvas();
      if (!_torRafId) _torRafId = requestAnimationFrame(_torLoop);
    }

    // ── Trash bin ────────────────────────────────────────────────
    const trashWidget = document.getElementById('trashWidget');
    const TRASH_W = 72, TRASH_H = 92;

    // Screen rect of the bin opening (top of body, below lid)
    function trashOpening() {
      const W = window.innerWidth, H = window.innerHeight;
      return {
        l: W - 14 - TRASH_W + 6,   // left edge of trapezoid opening
        r: W - 14 - 6,              // right edge
        t: H - TRASH_H + 28,        // top of body (below rim)
        b: H - TRASH_H + 52,        // mid-body (letters should stop here)
      };
    }

    function playTrashGulp() {
      if (AC.state === 'suspended') AC.resume();
      _noise(0.14, 0.06, 600, 2.2, 'bandpass');   // paper crinkle
      _tone(140, 0.07, 0.10, 'sine');               // soft thud
    }

    function checkTrashAbsorb() {
      if (trashWidget.style.display === 'none') return;
      const o = trashOpening();
      let gulped = false;
      for (const p of allParticles) {
        if (p.gone) continue;
        const cx = p.x + p.w * 0.5, cy = p.y + p.h * 0.5;
        if (cx > o.l && cx < o.r && cy > o.t && cy < o.b && p.vy > 0) {
          // Letter falls into bin — shrink + fade, then remove
          p.gone = true; heightMapDirty = true;
          p.el.style.transition = 'transform 0.18s ease-in, opacity 0.18s';
          p.el.style.transform  = 'scale(0.05)';
          p.el.style.opacity    = '0';
          setTimeout(() => p.el.remove(), 200);
          gulped = true;
        }
      }
      if (gulped) {
        playTrashGulp();
        // Lid bounces open briefly
        trashWidget.classList.add('trash-gulp');
        setTimeout(() => trashWidget.classList.remove('trash-gulp'), 320);
      }
    }

    torBtn.addEventListener('click', e => {
      e.stopPropagation();   // don't trigger drag-start on the parent
      torOn = !torOn;
      torBtn.classList.toggle('on', torOn);
      playTorSwitch(torOn);
      tornadoWidget.classList.toggle('tor-on', torOn);
      trashWidget.classList.toggle('tor-on', torOn);
      if (torOn) {
        _initTornadoSound();
        ensureLoop();
      } else {
        if (tornadoWidget.style.display !== 'none') {
          tornadoWidget.style.display = 'none';
          trashWidget.style.display = 'none';
          toptTor.classList.remove('active');
          activeTool = null;
          setLauncher(true);
        }
      }
    });

    // Drag the tornado vortex with pointer capture
    let _torDrag = false, _torOX = 0, _torOY = 0;
    torCore.addEventListener('pointerdown', e => {
      if (e.target === torBtn) return;
      _torDrag = true;
      _torOX = e.clientX - torX;
      _torOY = e.clientY - torY;
      torCore.setPointerCapture(e.pointerId);
    });
    torCore.addEventListener('pointermove', e => {
      if (!_torDrag) return;
      torX = Math.max(0, Math.min(window.innerWidth,  e.clientX - _torOX));
      torY = Math.max(0, Math.min(window.innerHeight, e.clientY - _torOY));
      positionTorCore();
    });
    torCore.addEventListener('pointerup',     () => { _torDrag = false; });
    torCore.addEventListener('pointercancel', () => { _torDrag = false; });

    // ── Tasks / persistence ──────────────────────────────────────
    const TASK_STORAGE_KEY = 'funnyTodo.tasks';
    const WEEKLY_DONE_STORAGE_KEY = 'weeklyTodo.completedTasks';
    const WEEKLY_MARKDOWN_STORAGE_KEY = 'weeklyTodo.markdown';
    const DEFAULT_TASKS = ['Buy groceries', 'Read for 30 minutes', 'Go for a walk'];

    function createTaskId() {
      return `${Date.now()}-${Math.random().toString(36).slice(2)}`;
    }

    function normalizeSubtasks(subtasks) {
      if (!Array.isArray(subtasks)) return [];
      return subtasks.map(item => {
        if (typeof item === 'string') item = { text: item };
        if (!item || typeof item.text !== 'string') return null;
        const text = item.text.trim();
        if (!text) return null;
        return {
          id: typeof item.id === 'string' ? item.id : createTaskId(),
          text,
          done: item.done === true,
        };
      }).filter(Boolean);
    }

    function readStoredTasks() {
      try {
        const raw = localStorage.getItem(TASK_STORAGE_KEY);
        if (raw === null) return null;
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.map(task => {
          if (typeof task === 'string') task = { text: task };
          if (!task || typeof task.text !== 'string') return null;
          const text = task.text.trim();
          if (!text) return null;
          return {
            id: typeof task.id === 'string' ? task.id : createTaskId(),
            text,
            subtasks: normalizeSubtasks(task.subtasks),
          };
        }).filter(Boolean);
      } catch (err) {
        console.warn('Could not read stored tasks:', err);
        return null;
      }
    }

    function readCompletedTasks() {
      try {
        const raw = localStorage.getItem(WEEKLY_DONE_STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(parsed)) return [];
        return parsed.map(task => {
          if (!task || typeof task.text !== 'string') return null;
          const text = task.text.trim();
          if (!text) return null;
          return {
            id: typeof task.id === 'string' ? task.id : createTaskId(),
            text,
            subtasks: normalizeSubtasks(task.subtasks),
            completedAt: typeof task.completedAt === 'string' ? task.completedAt : new Date().toISOString(),
          };
        }).filter(Boolean);
      } catch (err) {
        console.warn('Could not read completed tasks:', err);
        return [];
      }
    }

    function saveTasks() {
      try {
        localStorage.setItem(TASK_STORAGE_KEY, JSON.stringify(todoTasks));
      } catch (err) {
        console.warn('Could not save tasks:', err);
      }
    }

    function saveCompletedTasks() {
      try {
        localStorage.setItem(WEEKLY_DONE_STORAGE_KEY, JSON.stringify(completedTasks));
      } catch (err) {
        console.warn('Could not save completed tasks:', err);
      }
    }

    function escapeMarkdown(text) {
      return text.replace(/\\/g, '\\\\').replace(/\[/g, '\\[').replace(/\]/g, '\\]');
    }

    function formatExportDate(date = new Date()) {
      return date.toISOString().slice(0, 10);
    }

    function buildWeeklyMarkdown() {
      const lines = [
        '# Weekly To-do',
        '',
        `Exported: ${new Date().toLocaleString()}`,
        '',
        '## Completed tasks',
        '',
      ];

      if (completedTasks.length === 0) {
        lines.push('- No completed tasks yet.');
      } else {
        for (const task of completedTasks) {
          lines.push(`- [x] ${escapeMarkdown(task.text)}`);
          for (const subtask of task.subtasks) {
            lines.push(`  - [${subtask.done ? 'x' : ' '}] ${escapeMarkdown(subtask.text)}`);
          }
        }
      }

      lines.push('', '## Open tasks', '');
      if (todoTasks.length === 0) {
        lines.push('- No open tasks.');
      } else {
        for (const task of todoTasks) {
          lines.push(`- [ ] ${escapeMarkdown(task.text)}`);
          for (const subtask of task.subtasks) {
            lines.push(`  - [${subtask.done ? 'x' : ' '}] ${escapeMarkdown(subtask.text)}`);
          }
        }
      }

      return `${lines.join('\n')}\n`;
    }

    function saveWeeklyMarkdown() {
      try {
        localStorage.setItem(WEEKLY_MARKDOWN_STORAGE_KEY, buildWeeklyMarkdown());
      } catch (err) {
        console.warn('Could not save weekly markdown:', err);
      }
    }

    function rememberCompletedTask(task) {
      const completedTask = {
        id: task.id,
        text: task.text,
        subtasks: normalizeSubtasks(task.subtasks),
        completedAt: new Date().toISOString(),
      };
      completedTasks = [
        ...completedTasks.filter(item => item.id !== task.id),
        completedTask,
      ];
      saveCompletedTasks();
      saveWeeklyMarkdown();
    }

    function exportWeeklyMarkdown() {
      saveWeeklyMarkdown();
      const markdown = localStorage.getItem(WEEKLY_MARKDOWN_STORAGE_KEY) || buildWeeklyMarkdown();
      const blob = new Blob([markdown], { type: 'text/markdown;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `weekly-tasks-${formatExportDate()}.md`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    let todoTasks = readStoredTasks();
    let completedTasks = readCompletedTasks();
    if (todoTasks === null) {
      todoTasks = DEFAULT_TASKS.map(text => ({
        id: createTaskId(),
        text,
        subtasks: [],
      }));
      saveTasks();
    }
    saveWeeklyMarkdown();

    function removeStoredTask(id) {
      todoTasks = todoTasks.filter(task => task.id !== id);
      saveTasks();
      saveWeeklyMarkdown();
    }

    function updateStoredTask(id, updates) {
      todoTasks = todoTasks.map(task => task.id === id ? {...task, ...updates} : task);
      saveTasks();
      saveWeeklyMarkdown();
    }

    function findTask(id) {
      return todoTasks.find(task => task.id === id);
    }

    function parseSubtasks(text, existingSubtasks = []) {
      const existingByText = new Map();
      for (const subtask of existingSubtasks) {
        if (!existingByText.has(subtask.text)) existingByText.set(subtask.text, []);
        existingByText.get(subtask.text).push(subtask);
      }
      return text.split('\n')
        .map(line => line.trim())
        .filter(Boolean)
        .map(text => {
          const match = existingByText.get(text)?.shift();
          return match ? {...match, text} : { id: createTaskId(), text, done: false };
        });
    }

    function renderSubtasks(listEl, task, li, span) {
      listEl.innerHTML = '';
      for (const subtask of task.subtasks) {
        const item = document.createElement('li');
        item.className = 'subtask-item';
        const check = document.createElement('button');
        const text = document.createElement('span');

        check.type = 'button';
        check.className = 'subtask-check';
        check.classList.toggle('checked', subtask.done);
        check.setAttribute('aria-label', `${subtask.done ? 'Mark incomplete' : 'Mark complete'}: ${subtask.text}`);
        text.className = 'subtask-text';
        text.classList.toggle('done', subtask.done);
        text.textContent = subtask.text;

        check.addEventListener('click', () => {
          const currentTask = findTask(task.id);
          if (!currentTask) return;
          const subtasks = currentTask.subtasks.map(item =>
            item.id === subtask.id ? {...item, done: !item.done} : item
          );
          updateStoredTask(task.id, {subtasks});
          const nextTask = {...currentTask, subtasks};
          renderSubtasks(listEl, nextTask, li, span);
          if (subtasks.length > 0 && subtasks.every(item => item.done)) {
            complete(li, li.querySelector('.check-box'), span, task.id);
          }
        });

        item.appendChild(check);
        item.appendChild(text);
        listEl.appendChild(item);
      }
    }

    // ── Add task ─────────────────────────────────────────────────
    function addTask() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      const task = { id: createTaskId(), text, subtasks: [] };
      todoTasks.push(task);
      saveTasks();
      saveWeeklyMarkdown();
      renderTask(task);
    }

    function renderTask(task) {
      const li   = document.createElement('li');  li.className = 'todo-item';
      li.dataset.taskId = task.id;
      const cb   = document.createElement('div'); cb.className = 'check-box';
      const body = document.createElement('div'); body.className = 'todo-content';
      const span = document.createElement('span'); span.className = 'todo-text';
      const subtaskList = document.createElement('ul'); subtaskList.className = 'subtask-list';
      const editBtn = document.createElement('button');
      const panel = document.createElement('div'); panel.className = 'edit-panel';
      const titleLabel = document.createElement('label'); titleLabel.className = 'field-label';
      const titleInput = document.createElement('input');
      const subtasksLabel = document.createElement('label'); subtasksLabel.className = 'field-label';
      const subtasksInput = document.createElement('textarea');
      const actions = document.createElement('div'); actions.className = 'edit-actions';
      const cancelBtn = document.createElement('button');
      const saveBtn = document.createElement('button');

      span.textContent = task.text;
      renderSubtasks(subtaskList, task, li, span);

      editBtn.className = 'edit-btn';
      editBtn.type = 'button';
      editBtn.title = 'Edit task';
      editBtn.setAttribute('aria-label', `Edit ${task.text}`);
      editBtn.innerHTML = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 20h4l10-10-4-4L4 16v4Z"></path><path d="m12 6 4 4"></path></svg>';

      titleLabel.textContent = 'Main task';
      titleInput.type = 'text';
      titleInput.maxLength = 120;
      titleInput.value = task.text;
      subtasksLabel.textContent = 'Subtasks (one per line)';
      subtasksInput.placeholder = 'Break this task into smaller steps';
      subtasksInput.maxLength = 800;
      subtasksInput.value = task.subtasks.map(item => item.text).join('\n');
      cancelBtn.type = 'button';
      cancelBtn.textContent = 'Cancel';
      saveBtn.type = 'button';
      saveBtn.className = 'save-edit';
      saveBtn.textContent = 'Save';

      actions.appendChild(cancelBtn);
      actions.appendChild(saveBtn);
      panel.appendChild(titleLabel);
      panel.appendChild(titleInput);
      panel.appendChild(subtasksLabel);
      panel.appendChild(subtasksInput);
      panel.appendChild(actions);
      body.appendChild(span);
      body.appendChild(subtaskList);
      li.appendChild(cb);
      li.appendChild(body);
      li.appendChild(editBtn);
      li.appendChild(panel);
      list.appendChild(li);

      cb.addEventListener('click', () => complete(li, cb, span, task.id));
      editBtn.addEventListener('click', () => {
        const currentTask = findTask(task.id);
        titleInput.value = currentTask ? currentTask.text : task.text;
        subtasksInput.value = currentTask
          ? currentTask.subtasks.map(item => item.text).join('\n')
          : task.subtasks.map(item => item.text).join('\n');
        li.classList.toggle('edit-open');
        editBtn.classList.toggle('active', li.classList.contains('edit-open'));
        if (li.classList.contains('edit-open')) titleInput.focus();
      });
      saveBtn.addEventListener('click', () => {
        const nextText = titleInput.value.trim();
        if (!nextText) {
          titleInput.focus();
          return;
        }
        const currentTask = findTask(task.id);
        const subtasks = parseSubtasks(subtasksInput.value, currentTask ? currentTask.subtasks : task.subtasks);
        const nextTask = { text: nextText, subtasks };
        updateStoredTask(task.id, nextTask);
        task.text = nextText;
        task.subtasks = subtasks;
        span.textContent = nextText;
        renderSubtasks(subtaskList, {...task, ...nextTask}, li, span);
        editBtn.setAttribute('aria-label', `Edit ${nextText}`);
        li.classList.remove('edit-open');
        editBtn.classList.remove('active');
      });
      cancelBtn.addEventListener('click', () => {
        const currentTask = findTask(task.id);
        titleInput.value = currentTask ? currentTask.text : task.text;
        subtasksInput.value = currentTask
          ? currentTask.subtasks.map(item => item.text).join('\n')
          : task.subtasks.map(item => item.text).join('\n');
        li.classList.remove('edit-open');
        editBtn.classList.remove('active');
      });
    }
    addBtn.addEventListener('click', addTask);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    // ── Complete — scatter letters ────────────────────────────────
    function complete(li, cb, span, taskId) {
      const task = findTask(taskId);
      if (task) rememberCompletedTask(task);
      removeStoredTask(taskId);
      playCheck();
      cb.classList.add('checked');
      li.style.pointerEvents = 'none';
      const chars = [...span.textContent];
      span.innerHTML = chars.map(c => `<span>${c === ' ' ? '&nbsp;' : c}</span>`).join('');
      const charData = [];
      span.querySelectorAll('span').forEach((s, i) => {
        const r = s.getBoundingClientRect();
        charData.push({ char: chars[i], x: r.left, y: r.top, w: r.width, h: r.height });
      });
      setTimeout(() => {
        li.style.transition = 'opacity 0.15s';
        li.style.opacity = '0';
        setTimeout(() => li.remove(), 150);
      }, 80);
      charData.forEach(cd => {
        if (cd.char === ' ') return;
        allParticles.push(spawnLetter(cd));
      });
      ensureLoop();
    }
    exportWeeklyBtn.addEventListener('click', exportWeeklyMarkdown);

    // ── Tool Launcher ─────────────────────────────────────────────
    const tlbtn    = document.getElementById('tlbtn');
    const tradial  = document.getElementById('tradial');
    const toptFan  = document.getElementById('topt-fan');
    const toptVac  = document.getElementById('topt-vac');
    const toptTor  = document.getElementById('topt-tor');

    let menuOpen   = false;
    let activeTool = null;   // 'fan' | 'vac' | 'tor' | null

    // Compute each option's outward position in the arc and store it.
    // Call again when tools are added so positions re-spread automatically.
    function layoutOptions() {
      const opts = [...tradial.querySelectorAll('.toption')];
      const n = opts.length;
      const R = 90;
      // Sweep 105°–195° (upper-left quadrant); single item lands at 135°
      const mid    = 135 * Math.PI / 180;
      const spread = Math.min(76, (n - 1) * 38) * Math.PI / 180;
      opts.forEach((opt, i) => {
        const a  = mid + (n === 1 ? 0 : (i / (n - 1) - 0.5) * spread);
        opt._dx  =  Math.cos(a) * R;   // cos(135°) is already negative → moves left
        opt._dy  = -Math.sin(a) * R;   // flip y: negative = up in screen coords
        // Start collapsed at the FAB centre
        opt.style.transform = `translate(${opt._dx}px,${opt._dy}px) scale(0)`;
        opt.style.opacity   = '0';
      });
    }
    layoutOptions();

    function setMenuOpen(open) {
      menuOpen = open;
      tlbtn.classList.toggle('open', open);
      [...tradial.querySelectorAll('.toption')].forEach(opt => {
        opt.style.transform    = `translate(${opt._dx}px,${opt._dy}px) scale(${open ? 1 : 0})`;
        opt.style.opacity      = open ? '1' : '0';
        opt.style.pointerEvents = open ? 'auto' : 'none';
      });
    }

    tlbtn.addEventListener('click', () => setMenuOpen(!menuOpen));

    // Close when clicking outside the launcher
    document.addEventListener('click', e => {
      if (menuOpen && !document.getElementById('tlauncher').contains(e.target))
        setMenuOpen(false);
    });

    // Show/hide the FAB launcher
    function setLauncher(visible) {
      document.getElementById('tlauncher').classList.toggle('tool-hidden', !visible);
    }

    // Deactivate whatever tool is active, restore FAB.
    // Widget is hidden BEFORE clicking the power button so the button handler's
    // "auto-hide on off" check (display !== 'none') doesn't double-fire.
    function deactivateCurrentTool() {
      if (activeTool === 'fan') {
        toptFan.classList.remove('active');
        fanWidget.style.display = 'none';
        if (fanOn) fanBtn.click();
      }
      if (activeTool === 'vac') {
        toptVac.classList.remove('active');
        vacuumWidget.style.display = 'none';
        if (vacOn) vacBtn.click();
      }
      if (activeTool === 'tor') {
        toptTor.classList.remove('active');
        tornadoWidget.style.display = 'none';
        trashWidget.style.display = 'none';
        if (torOn) torBtn.click();
      }
      activeTool = null;
      setLauncher(true);
    }

    // Fan option
    toptFan.addEventListener('click', () => {
      if (activeTool === 'fan') { deactivateCurrentTool(); }
      else {
        deactivateCurrentTool();
        activeTool = 'fan';
        toptFan.classList.add('active');
        fanWidget.style.display = '';
        setMenuOpen(false);
        setLauncher(false);
      }
    });

    // Vacuum option
    toptVac.addEventListener('click', () => {
      if (activeTool === 'vac') { deactivateCurrentTool(); }
      else {
        deactivateCurrentTool();
        activeTool = 'vac';
        toptVac.classList.add('active');
        vacuumWidget.style.display = '';
        setMenuOpen(false);
        setLauncher(false);
      }
    });

    // Tornado option
    toptTor.addEventListener('click', () => {
      if (activeTool === 'tor') { deactivateCurrentTool(); }
      else {
        deactivateCurrentTool();
        activeTool = 'tor';
        toptTor.classList.add('active');
        tornadoWidget.style.display = '';
        trashWidget.style.display = '';
        positionTorCore();
        startTorCanvas();
        setMenuOpen(false);
        setLauncher(false);
      }
    });

    todoTasks.forEach(renderTask);
  </script>
</body>
