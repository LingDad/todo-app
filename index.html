<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-do</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f5f4f0;
      font-family: 'Georgia', serif;
      display: flex;
      justify-content: center;
      padding: 60px 16px 120px;
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 2rem;
      font-weight: normal;
      color: #1a1a1a;
      margin-bottom: 32px;
      letter-spacing: -0.5px;
    }

    /* Input */
    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    .add-row input {
      flex: 1;
      padding: 12px 16px;
      font-size: 1rem;
      font-family: inherit;
      border: 1.5px solid #d0cfc9;
      border-radius: 8px;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
      color: #1a1a1a;
    }
    .add-row input:focus { border-color: #888; }
    .add-row input::placeholder { color: #aaa; }

    .add-btn {
      padding: 12px 20px;
      font-size: 1.4rem;
      line-height: 1;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .add-btn:hover { background: #333; }

    /* List */
    .todo-list { list-style: none; }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #e5e4df;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Custom checkbox */
    .todo-item input[type="checkbox"] { display: none; }

    .check-box {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border: 1.5px solid #c0bfba;
      border-radius: 50%;
      cursor: pointer;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .check-box:hover { border-color: #888; }
    .check-box.checked {
      background: #1a1a1a;
      border-color: #1a1a1a;
    }
    .check-box.checked::after {
      content: '';
      width: 6px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .todo-text {
      font-size: 1.05rem;
      color: #1a1a1a;
      line-height: 1.5;
      word-break: break-word;
      user-select: none;
    }

    /* Falling letters */
    .falling-letter {
      position: fixed;
      pointer-events: none;
      font-family: 'Georgia', serif;
      font-size: 1.05rem;
      color: #1a1a1a;
      line-height: 1;
      transform-origin: center center;
      z-index: 9999;
      user-select: none;
    }

    /* ── Vintage desk fan ──────────────────────────────────── */
    .fan-widget {
      position: fixed;
      bottom: 88px;
      right: 18px;
      z-index: 9998;
      user-select: none;
      /* NOTE: no filter here — filter creates a stacking context that flattens 3-D children */
      perspective: 380px;
      transform-style: preserve-3d;
    }
    /* The head (SVG) pivots at the neck — transform-origin at bottom centre */
    .fan-head-wrap {
      position: relative;
      transform-origin: 50% 100%;
      transform: rotateY(0deg);
      transform-style: preserve-3d;
    }
    /* Housing depth: circular slab behind the face, visible when rotated */
    .fan-head-wrap::before {
      content: '';
      position: absolute;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: radial-gradient(circle at 42% 36%, #b0a070, #604e32, #2a1c0e);
      top: 0; left: 0;
      transform: translateZ(-13px);
      pointer-events: none;
    }
    .fan-face {
      display: block;
      margin: 0 auto;
      filter: drop-shadow(2px 8px 13px rgba(0,0,0,0.44));
    }

    /* Blade spin — duration is adjusted by JS for spin-up / spin-down */
    @keyframes fanSpin { to { transform: rotate(360deg); } }
    #bladesGroup {
      transform-box: fill-box;
      transform-origin: center;
    }

    .fan-neck {
      width: 18px;
      height: 22px;
      background: linear-gradient(90deg, #caba90 0%, #8a7860 48%, #c2b288 100%);
      margin: -1px auto 0;
      clip-path: polygon(18% 0%, 82% 0%, 94% 100%, 6% 100%);
    }
    .fan-base {
      width: 108px;
      height: 33px;
      background: linear-gradient(180deg, #ccba96 0%, #a88e6c 55%, #8c7256 100%);
      border-radius: 17px;
      margin: 0 auto;
      position: relative;
      box-shadow:
        0 6px 16px rgba(0,0,0,0.50),
        inset 0 1px 0 rgba(255,242,210,0.42),
        inset 0 -3px 7px rgba(0,0,0,0.24);
    }
    .fan-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 21px;
      height: 21px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 33%, #cc3828, #7c0e18);
      border: 2px solid #4e080e;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.62), inset 0 1px 0 rgba(255,150,130,0.45);
      transition: transform 0.08s, box-shadow 0.08s;
      outline: none;
    }
    .fan-btn:hover { filter: brightness(1.12); }
    .fan-btn:active {
      transform: translateY(calc(-50% + 2px));
      box-shadow: 0 1px 2px rgba(0,0,0,0.6), inset 0 2px 5px rgba(0,0,0,0.42);
    }
    .fan-btn.on {
      background: radial-gradient(circle at 38% 33%, #4ed824, #168010);
      border-color: #0a5008;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5),
                  0 0 11px rgba(78,218,36,0.70),
                  inset 0 1px 0 rgba(160,255,110,0.55);
    }
    .fan-label {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Georgia', serif;
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      color: rgba(60,45,28,0.65);
      pointer-events: none;
    }

    /* Mobile: scale the whole fan down, anchored to bottom-right corner */
    @media (max-width: 640px) {
      .fan-widget {
        transform: scale(0.62);
        transform-origin: bottom right;
      }
    }

    /* ── Tool Launcher & Radial Menu ──────────────────────────────── */
    .tlauncher {
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 9999;
      user-select: none;
    }

    /* Main FAB button */
    .tlbtn {
      position: relative;
      z-index: 1;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #1a1a1a;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 18px rgba(0,0,0,0.42);
      color: #fff;
      outline: none;
      transition: background 0.18s, transform 0.26s cubic-bezier(0.34,1.56,0.64,1);
    }
    .tlbtn:hover   { background: #333; }
    .tlbtn.open    { transform: rotate(45deg); background: #3c3c3c; }

    /* Zero-size container centred on the FAB */
    .tradial {
      position: absolute;
      bottom: 26px;
      right: 26px;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    /* Individual tool option */
    .toption {
      position: absolute;
      width: 44px;
      height: 44px;
      margin: -22px;          /* centres the button on tradial's origin */
      border-radius: 50%;
      background: #242424;
      border: 2px solid #484848;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 14px rgba(0,0,0,0.48);
      color: #bbb;
      outline: none;
      pointer-events: none;
      transform: scale(0);    /* closed: collapsed on FAB centre */
      opacity: 0;
      transition: transform 0.30s cubic-bezier(0.34,1.56,0.64,1),
                  opacity   0.22s,
                  background 0.15s,
                  border-color 0.15s,
                  color 0.15s;
    }
    .toption:hover  { background: #363636; border-color: #666; color: #fff; }
    .toption.active { border-color: #c8aa6a; background: #221b0e; color: #e8c87a; }

    /* Label tooltip */
    .toption::after {
      content: attr(data-label);
      position: absolute;
      right: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      white-space: nowrap;
      font-family: 'Georgia', serif;
      font-size: 0.68rem;
      letter-spacing: 0.04em;
      color: #eee;
      background: rgba(0,0,0,0.76);
      padding: 4px 9px;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.14s;
    }
    .toption:hover::after { opacity: 1; }

    @media (max-width: 640px) {
      .tlauncher {
        transform: scale(0.75);
        transform-origin: bottom right;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>To-do</h1>
    <div class="add-row">
      <input type="text" id="taskInput" placeholder="Add a task…" maxlength="120" />
      <button class="add-btn" id="addBtn" title="Add">+</button>
    </div>
    <ul class="todo-list" id="todoList"></ul>
  </div>

  <!-- ── Vintage desk fan ──────────────────────────────────── -->
  <div class="fan-widget" id="fanWidget" style="display:none">
    <div class="fan-head-wrap" id="fanHead">
    <svg class="fan-face" viewBox="0 0 110 110" width="130" height="130" aria-hidden="true">
      <defs>
        <radialGradient id="housingGrad" cx="40%" cy="34%" r="64%">
          <stop offset="0%"   stop-color="#e4d4b4"/>
          <stop offset="52%"  stop-color="#b09878"/>
          <stop offset="100%" stop-color="#7a6448"/>
        </radialGradient>
        <linearGradient id="bladeGrad" x1="22%" y1="0%" x2="78%" y2="100%">
          <stop offset="0%"   stop-color="#d2c29e"/>
          <stop offset="44%"  stop-color="#a89272"/>
          <stop offset="100%" stop-color="#6e5a46"/>
        </linearGradient>
        <radialGradient id="hubGrad" cx="38%" cy="33%" r="68%">
          <stop offset="0%"   stop-color="#caba94"/>
          <stop offset="100%" stop-color="#36261a"/>
        </radialGradient>
        <clipPath id="bladeClip">
          <circle cx="55" cy="55" r="52"/>
        </clipPath>
        <filter id="bladeShadow" x="-10%" y="-10%" width="120%" height="120%">
          <feDropShadow dx="1" dy="1.5" stdDeviation="1.5" flood-opacity="0.30"/>
        </filter>
      </defs>

      <!-- Motor-housing back plate -->
      <circle cx="55" cy="55" r="53" fill="url(#housingGrad)" stroke="#5a4634" stroke-width="1"/>

      <!-- Rotating blades — JS sets animation-name / animation-duration inline -->
      <g id="bladesGroup" clip-path="url(#bladeClip)" filter="url(#bladeShadow)">
        <path fill="url(#bladeGrad)" opacity="0.92"
          d="M52 46 C44 30 38 18 36 10 C44 2 66 4 68 12 C72 24 64 36 58 46 Z"/>
        <path fill="url(#bladeGrad)" opacity="0.92" transform="rotate(90 55 55)"
          d="M52 46 C44 30 38 18 36 10 C44 2 66 4 68 12 C72 24 64 36 58 46 Z"/>
        <path fill="url(#bladeGrad)" opacity="0.92" transform="rotate(180 55 55)"
          d="M52 46 C44 30 38 18 36 10 C44 2 66 4 68 12 C72 24 64 36 58 46 Z"/>
        <path fill="url(#bladeGrad)" opacity="0.92" transform="rotate(270 55 55)"
          d="M52 46 C44 30 38 18 36 10 C44 2 66 4 68 12 C72 24 64 36 58 46 Z"/>
      </g>

      <!-- Wire cage — drawn in front of blades -->
      <g clip-path="url(#bladeClip)" stroke="#8a887a" fill="none" opacity="0.80">
        <circle cx="55" cy="55" r="13"  stroke-width="1.3"/>
        <circle cx="55" cy="55" r="25"  stroke-width="1.3"/>
        <circle cx="55" cy="55" r="38"  stroke-width="1.3"/>
        <circle cx="55" cy="55" r="51"  stroke-width="1.6"/>
        <line x1="55" y1="4"  x2="55" y2="106" stroke-width="1.1"/>
        <line x1="4"  y1="55" x2="106" y2="55"  stroke-width="1.1"/>
        <line x1="18" y1="18" x2="92"  y2="92"  stroke-width="1.1"/>
        <line x1="92" y1="18" x2="18"  y2="92"  stroke-width="1.1"/>
        <line x1="16" y1="37" x2="94"  y2="73"  stroke-width="0.9"/>
        <line x1="37" y1="16" x2="73"  y2="94"  stroke-width="0.9"/>
        <line x1="94" y1="37" x2="16"  y2="73"  stroke-width="0.9"/>
        <line x1="73" y1="16" x2="37"  y2="94"  stroke-width="0.9"/>
      </g>

      <!-- Hub cap -->
      <circle cx="55" cy="55" r="12" fill="url(#hubGrad)" stroke="#2c1c10" stroke-width="1.5"/>
      <circle cx="55" cy="55" r="5"  fill="#1e1008"/>

      <!-- Outer rim + upper-left highlight arc -->
      <circle cx="55" cy="55" r="53" fill="none" stroke="#6a5440" stroke-width="3"/>
      <path d="M22 28 A42 42 0 0 1 55 4" stroke="rgba(228,210,172,0.55)"
            stroke-width="3" fill="none" stroke-linecap="round"/>
    </svg>
    </div><!-- /.fan-head-wrap -->

    <div class="fan-neck"></div>
    <div class="fan-base">
      <span class="fan-label">FAN</span>
      <button class="fan-btn" id="fanBtn" aria-label="Fan power toggle"></button>
    </div>
  </div>

  <!-- ── Tool Launcher ─────────────────────────────────────── -->
  <div class="tlauncher" id="tlauncher">
    <!-- Radial menu options (zero-size origin at FAB centre) -->
    <div class="tradial" id="tradial">
      <button class="toption" id="topt-fan" data-label="Fan" aria-label="Fan">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
          <path d="M12 12C10.5 9 10.5 5.5 12 3.5C15 1 17 5.5 12 12Z" opacity="0.9"/>
          <path d="M12 12C10.5 9 10.5 5.5 12 3.5C15 1 17 5.5 12 12Z" opacity="0.9" transform="rotate(90 12 12)"/>
          <path d="M12 12C10.5 9 10.5 5.5 12 3.5C15 1 17 5.5 12 12Z" opacity="0.9" transform="rotate(180 12 12)"/>
          <path d="M12 12C10.5 9 10.5 5.5 12 3.5C15 1 17 5.5 12 12Z" opacity="0.9" transform="rotate(270 12 12)"/>
          <circle cx="12" cy="12" r="2.3"/>
        </svg>
      </button>
    </div>
    <!-- FAB -->
    <button class="tlbtn" id="tlbtn" aria-label="Tools">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none"
           stroke-width="2.6" stroke-linecap="round" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5"  y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>

  <script>
    const input  = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const list   = document.getElementById('todoList');

    // ── Height map ───────────────────────────────────────────────
    // heightMap[i] = top-y of the pile surface at column i*CELL.
    // Starts at window.innerHeight (bare floor).
    const CELL = 4;
    let heightMap    = [];
    let heightMapDirty = false;   // set true when settled letters are un-settled by wind

    function initHeightMap() {
      heightMap = new Array(Math.ceil(window.innerWidth / CELL) + 4).fill(window.innerHeight);
    }
    initHeightMap();
    window.addEventListener('resize', initHeightMap);

    function getFloorAt(x, w) {
      const s = Math.max(0, Math.floor(x / CELL));
      const e = Math.min(heightMap.length - 1, Math.ceil((x + w) / CELL));
      let h = window.innerHeight;
      for (let i = s; i <= e; i++) h = Math.min(h, heightMap[i]);
      return h;
    }
    function raiseFloor(x, w, y) {
      const s = Math.max(0, Math.floor((x - 2) / CELL));
      const e = Math.min(heightMap.length - 1, Math.ceil((x + w + 2) / CELL));
      for (let i = s; i <= e; i++) heightMap[i] = Math.min(heightMap[i], y);
    }
    // Full rebuild from all currently-settled letters (called when wind dislodges letters)
    function rebuildHeightMap() {
      initHeightMap();
      for (const p of allParticles)
        if (p.settled && !p.gone) raiseFloor(p.x, p.w, p.y);
    }

    // Smooth local surface slope at screen-x = cx (averaged over SLOPE_R cells each side)
    const SLOPE_R = 6;
    function slopeAt(cx) {
      const ci = Math.round(cx / CELL);
      let sum = 0;
      for (let k = 1; k <= SLOPE_R; k++) {
        const il = Math.max(0, ci - k);
        const ir = Math.min(heightMap.length - 1, ci + k);
        sum += (heightMap[ir] - heightMap[il]) / (2 * k * CELL);
      }
      return Math.max(-2.5, Math.min(2.5, sum / SLOPE_R));
    }

    // ── Fan / wind state ─────────────────────────────────────────
    let fanOn        = false;
    let windRamping  = false;       // true only after head has finished turning
    let windStrength = 0;           // 0..1, ramped each frame
    const WIND_RAMP_UP   = 1 / (60 * 0.4);   // full strength in ~0.4 s
    const WIND_RAMP_DOWN = 1 / (60 * 0.6);   // zero in ~0.6 s
    const WIND_POWER     = 2.8;

    // Approximate screen position of the fan's centre (fixed widget, bottom-right)
    const fanCX = () => window.innerWidth  - 83;
    const fanCY = () => window.innerHeight - 180;   // fan now at bottom: 88px

    // ── Particle physics constants ───────────────────────────────
    const GRAVITY  = 0.52;    // px / frame²
    const TERM_VY  = 22;      // terminal fall speed
    const SUBSTEPS = 3;
    const DT       = 1 / SUBSTEPS;
    const ROT_DAMP = Math.pow(0.965, DT);   // per-substep rotational damping

    const allParticles = [];
    let   loopRunning  = false;

    // ── Spawn one letter particle ─────────────────────────────────
    function spawnLetter(cd) {
      const el = document.createElement('div');
      el.className  = 'falling-letter';
      el.textContent = cd.char;
      el.style.left  = cd.x + 'px';
      el.style.top   = cd.y + 'px';
      document.body.appendChild(el);
      return {
        el,
        x: cd.x, y: cd.y, w: cd.w, h: cd.h,
        vx: (Math.random() - 0.5) * 9,
        vy: -(1 + Math.random() * 3),         // upward burst on completion
        vr: (Math.random() - 0.5) * 18,
        rot: 0,
        drag:        0.008 + Math.random() * 0.010,  // per-letter air-resistance variety
        restitution: 0.55  + Math.random() * 0.13,
        mu:          0.48  + Math.random() * 0.36,
        sleepN: 0,
        settled:  false,
        gone:     false,
        airborne: true,
      };
    }

    // ── Single integration substep ────────────────────────────────
    function substep(p) {

      // ① Wind — applied before everything so it pre-loads momentum
      if (windStrength > 0) {
        const cx = p.x + p.w * 0.5,  cy = p.y + p.h * 0.5;
        const dx = cx - fanCX(),      dy = cy - fanCY();
        const dist   = Math.max(1, Math.hypot(dx, dy));
        const wf     = WIND_POWER * windStrength * DT / (1 + dist * 0.002);
        const vAtten = Math.exp(-Math.abs(dy) * 0.002);  // fan blows mostly sideways
        const turb   = wf * 0.35;
        p.vx += (dx / dist) * wf * 1.5 + (Math.random() - 0.5) * turb;
        p.vy += (dy / dist) * wf * 0.3 * vAtten + (Math.random() - 0.5) * turb * 0.5;
        if (p.settled) { p.settled = false; heightMapDirty = true; }
      }

      // ② Quadratic air drag (F proportional to v²) — paper-flutter feel
      const speed = Math.hypot(p.vx, p.vy);
      if (speed > 0.05) {
        const q = Math.min(0.45, p.drag * speed * DT);
        p.vx *= (1 - q);
        p.vy *= (1 - q);
      }

      // ③ Gravity + terminal velocity
      p.vy = Math.min(p.vy + GRAVITY * DT, TERM_VY);

      // ④ Semi-implicit Euler integration
      p.x += p.vx * DT;
      p.y += p.vy * DT;

      // ⑤ Rotation with fractional damping
      p.rot += p.vr * DT;
      p.vr  *= ROT_DAMP;

      // ⑥ Left edge: letters blown by fan escape off-screen; others bounce
      if (p.x + p.w < -40) { p.el.remove(); p.gone = true; return; }
      if (!fanOn && p.x < 0) {
        p.x  = 0;
        p.vx = Math.abs(p.vx) * p.restitution;
        p.vr -= p.vy * 0.12;
      }

      // ⑦ Right wall — always bounces (fan is there)
      if (p.x + p.w > window.innerWidth) {
        p.x  = window.innerWidth - p.w;
        p.vx = -Math.abs(p.vx) * p.restitution;
        p.vr += p.vy * 0.12;
      }

      // ⑧ Surface collision with slope-aware normal decomposition
      const surface = getFloorAt(p.x, p.w);
      if (p.y + p.h < surface) { p.airborne = true; p.sleepN = 0; return; }   // airborne

      p.y = surface - p.h;   // place on surface

      // Outward normal: N = (slope, -1) / |N|   (points "up" in screen space)
      const slp  = slopeAt(p.x + p.w * 0.5);
      const nLen = Math.hypot(slp, 1);
      const nx   = slp / nLen,  ny = -1 / nLen;
      const vn   = p.vx * nx + p.vy * ny;   // normal velocity (negative = hitting surface)

      const wasAirborne = p.airborne;
      p.airborne = false;

      if (vn < 0) {
        if (wasAirborne) playLand(-vn, surface < window.innerHeight - 8);
        const j = -(1 + p.restitution) * vn;
        p.vx += j * nx;
        p.vy += j * ny;
        // Coulomb friction along surface tangent  T = (1, slope) / |N|
        const tx = 1 / nLen,  ty = slp / nLen;
        const vt = p.vx * tx + p.vy * ty;
        const fj = vt * (1 - p.mu);
        p.vx -= fj * tx;
        p.vy -= fj * ty;
        // Tangential contact → spin coupling
        p.vr += vt * 0.55;
        p.vr *= (0.60 + p.mu * 0.28);
      }

      // ⑨ Sleep — freeze only when wind is negligible AND energy tiny
      if (windStrength < 0.01) {
        const E = p.vx * p.vx + p.vy * p.vy + Math.abs(p.vr) * 0.06;
        if (E < 0.10) {
          if (++p.sleepN >= 5 * SUBSTEPS) {
            p.vx = p.vy = p.vr = 0;
            p.y  = surface - p.h;
            p.settled = true;
            raiseFloor(p.x, p.w, p.y);
          }
        } else { p.sleepN = 0; }
      } else {
        p.sleepN = 0;   // never freeze while wind is blowing
      }
    }

    // ── Shared animation loop ─────────────────────────────────────
    function ensureLoop() {
      if (loopRunning) return;
      loopRunning = true;

      function tick() {
        // Ramp wind strength — only after head has finished turning (windRamping flag)
        if      (fanOn && windRamping  && windStrength < 1) windStrength = Math.min(1, windStrength + WIND_RAMP_UP);
        else if ((!fanOn || !windRamping) && windStrength > 0) windStrength = Math.max(0, windStrength - WIND_RAMP_DOWN);
        setWind(windStrength);

        // Rebuild height map when letters were dislodged by wind
        if (heightMapDirty) { rebuildHeightMap(); heightMapDirty = false; }

        // Wind pre-pass: un-settle resting letters so they enter the physics loop.
        // Closer letters to the fan get dislodged first (gradual cascade effect).
        // Only runs while fan is actively blowing — not during the ramp-down after
        // the fan is switched off, so letters stay where physics left them.
        if (windStrength > 0 && windRamping) {
          const fcx = fanCX(), fcy = fanCY();
          for (const p of allParticles) {
            if (!p.settled || p.gone) continue;
            const dist = Math.hypot(p.x + p.w * 0.5 - fcx, p.y + p.h * 0.5 - fcy);
            const wf   = WIND_POWER * windStrength / (1 + dist * 0.002);
            if (wf > 0.02) { p.settled = false; heightMapDirty = true; }
          }
        }

        let anyActive = false;
        for (const p of allParticles) {
          if (p.settled || p.gone) continue;
          for (let i = 0; i < SUBSTEPS; i++) {
            substep(p);
            if (p.settled || p.gone) break;
          }
          if (p.gone) continue;
          p.el.style.left      = p.x + 'px';
          p.el.style.top       = p.y + 'px';
          p.el.style.transform = `rotate(${p.rot}deg)`;
          if (!p.settled) anyActive = true;
        }

        // Keep loop alive while wind is active or letters are still moving
        if (anyActive || windStrength > 0 || (fanOn && windRamping)) requestAnimationFrame(tick);
        else loopRunning = false;
      }

      requestAnimationFrame(tick);
    }

    // ── Fan button ────────────────────────────────────────────────
    const fanBtn      = document.getElementById('fanBtn');
    const bladesGroup = document.getElementById('bladesGroup');
    const fanHead     = document.getElementById('fanHead');

    fanBtn.addEventListener('click', () => {
      fanOn = !fanOn;
      fanBtn.classList.toggle('on', fanOn);
      playFanSwitch(fanOn);

      if (fanOn) {
        _initWind();
        // ① Blades spin up (slow → fast)
        bladesGroup.style.cssText =
          'animation-name:fanSpin;animation-timing-function:linear;' +
          'animation-iteration-count:infinite;animation-duration:0.55s;' +
          'transform-box:fill-box;transform-origin:center';
        setTimeout(() => { if (fanOn) bladesGroup.style.animationDuration = '0.17s'; }, 460);

        // ② Head sweeps in two stages: first partial turn (scanning), then locks onto pile
        fanHead.style.transition = 'transform 0.65s cubic-bezier(0.4,0,0.2,1)';
        fanHead.style.transform  = 'rotateY(-20deg)';          // stage 1 — starts swinging left
        setTimeout(() => {
          if (!fanOn) return;
          fanHead.style.transition = 'transform 1.1s cubic-bezier(0.35,0,0.15,1)';
          fanHead.style.transform  = 'rotateY(-58deg)';         // stage 2 — locks onto pile
        }, 680);

        // ③ Wind starts only after the head has fully aimed at the pile
        setTimeout(() => { if (fanOn) { windRamping = true; ensureLoop(); } }, 1550);
        ensureLoop(); // keep physics ticking for any airborne letters during the delay

      } else {
        windRamping = false;   // stop wind immediately when button pressed

        // Head returns to resting forward position
        fanHead.style.transition = 'transform 1.5s cubic-bezier(0.4,0,0.2,1)';
        fanHead.style.transform  = 'rotateY(0deg)';

        // Blades spin down
        bladesGroup.style.animationDuration = '0.62s';
        setTimeout(() => { if (!fanOn) bladesGroup.style.animationName = 'none'; }, 750);
      }
    });

    // ══════════════════════════════════════════════════════════════
    // ── Web Audio Engine ─────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════
    const AC  = new (window.AudioContext || window.webkitAudioContext)();
    const _out = (() => {
      const g = AC.createGain(); g.gain.value = 0.78; g.connect(AC.destination); return g;
    })();

    // Short oscillator tone (freq Hz, vol 0-1, dur seconds, wave type)
    function _tone(freq, vol, dur, type = 'sine') {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
      o.connect(g); g.connect(_out); o.start(); o.stop(AC.currentTime + dur + 0.01);
    }

    // Short noise burst with filter
    function _noise(vol, dur, fq = 800, q = 1, tp = 'lowpass') {
      const len = Math.ceil(AC.sampleRate * Math.min(dur, 0.5));
      const buf = AC.createBuffer(1, len, AC.sampleRate);
      const d   = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      const s = AC.createBufferSource(), f = AC.createBiquadFilter(), g = AC.createGain();
      s.buffer = buf; f.type = tp; f.frequency.value = fq; f.Q.value = q;
      g.gain.setValueAtTime(vol, AC.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
      s.connect(f); f.connect(g); g.connect(_out); s.start(); s.stop(AC.currentTime + dur + 0.01);
    }

    // ① Task check — ascending ding (like a typewriter bell)
    function playCheck() {
      if (AC.state === 'suspended') AC.resume();
      _noise(0.06, 0.018, 4500);
      _tone(587, 0.18, 0.22);
      setTimeout(() => _tone(880, 0.12, 0.32), 75);
    }

    // ② Letter landing — floor thud vs. paper-on-paper crinkle
    let _landClock = 0;
    function playLand(impact, onLetters) {
      if (impact < 1.5) return;
      const now = AC.currentTime;
      if (now - _landClock < 0.038) return;   // throttle: max ~26 sounds/s
      _landClock = now;
      const vol = Math.min(0.20, impact * 0.012);
      if (onLetters) {
        _noise(vol, 0.055, 2200, 1.8, 'bandpass');   // crisp paper-on-paper
      } else {
        _noise(vol * 0.85, 0.07, 320, 1);             // dull thud
        _tone(95, vol * 0.30, 0.055);                  // bass resonance
      }
    }

    // ③ Fan power switch — hard click + motor spin-up or spin-down
    function playFanSwitch(on) {
      if (AC.state === 'suspended') AC.resume();
      _noise(0.38, 0.016, 5500, 1.5);           // mechanical click
      const t = AC.currentTime + 0.02;
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(on ? 45 : 160, t);
      o.frequency.exponentialRampToValueAtTime(on ? 190 : 38, t + 0.75);
      g.gain.setValueAtTime(0.065, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.78);
      o.connect(g); g.connect(_out); o.start(t); o.stop(t + 0.80);
    }

    // ④ Wind ambient — looped brownian noise, gain tracks windStrength
    let _wGain = null;
    function _initWind() {
      if (_wGain) return;
      const rate = AC.sampleRate, len = rate * 4;
      const buf = AC.createBuffer(1, len, rate);
      const d   = buf.getChannelData(0);
      let b = 0, mx = 0;
      for (let i = 0; i < len; i++) {
        b = b * 0.993 + (Math.random() - 0.5) * 0.062;
        d[i] = b; mx = Math.max(mx, Math.abs(b));
      }
      if (mx > 0) for (let i = 0; i < len; i++) d[i] /= mx;   // normalise
      const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
      const lp  = AC.createBiquadFilter(); lp.type  = 'lowpass';  lp.frequency.value = 1100;
      const hp  = AC.createBiquadFilter(); hp.type  = 'highpass'; hp.frequency.value = 160;
      _wGain = AC.createGain(); _wGain.gain.value = 0;
      src.connect(lp); lp.connect(hp); hp.connect(_wGain); _wGain.connect(_out);
      src.start();
    }
    function setWind(s) {
      if (_wGain) _wGain.gain.setTargetAtTime(s * 0.15, AC.currentTime, 0.28);
    }

    // ── Add task ─────────────────────────────────────────────────
    function addTask() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      const li   = document.createElement('li');  li.className = 'todo-item';
      const cb   = document.createElement('div'); cb.className = 'check-box';
      const span = document.createElement('span'); span.className = 'todo-text';
      span.textContent = text;
      li.appendChild(cb); li.appendChild(span); list.appendChild(li);
      cb.addEventListener('click', () => complete(li, cb, span));
    }
    addBtn.addEventListener('click', addTask);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    // ── Complete — scatter letters ────────────────────────────────
    function complete(li, cb, span) {
      playCheck();
      cb.classList.add('checked');
      li.style.pointerEvents = 'none';
      const chars = [...span.textContent];
      span.innerHTML = chars.map(c => `<span>${c === ' ' ? '&nbsp;' : c}</span>`).join('');
      const charData = [];
      span.querySelectorAll('span').forEach((s, i) => {
        const r = s.getBoundingClientRect();
        charData.push({ char: chars[i], x: r.left, y: r.top, w: r.width, h: r.height });
      });
      setTimeout(() => {
        li.style.transition = 'opacity 0.15s';
        li.style.opacity = '0';
        setTimeout(() => li.remove(), 150);
      }, 80);
      charData.forEach(cd => {
        if (cd.char === ' ') return;
        allParticles.push(spawnLetter(cd));
      });
      ensureLoop();
    }

    // ── Tool Launcher ─────────────────────────────────────────────
    const tlbtn    = document.getElementById('tlbtn');
    const tradial  = document.getElementById('tradial');
    const toptFan  = document.getElementById('topt-fan');

    let menuOpen   = false;
    let activeTool = null;   // 'fan' | null (more tools later)

    // Compute each option's outward position in the arc and store it.
    // Call again when tools are added so positions re-spread automatically.
    function layoutOptions() {
      const opts = [...tradial.querySelectorAll('.toption')];
      const n = opts.length;
      const R = 78;
      // Sweep 105°–165° (upper-left quadrant); single item lands at 135°
      const mid    = 135 * Math.PI / 180;
      const spread = Math.min(60, (n - 1) * 50) * Math.PI / 180;
      opts.forEach((opt, i) => {
        const a  = mid + (n === 1 ? 0 : (i / (n - 1) - 0.5) * spread);
        opt._dx  = -Math.cos(a) * R;
        opt._dy  = -Math.sin(a) * R;
        // Start collapsed at the FAB centre
        opt.style.transform = `translate(${opt._dx}px,${opt._dy}px) scale(0)`;
        opt.style.opacity   = '0';
      });
    }
    layoutOptions();

    function setMenuOpen(open) {
      menuOpen = open;
      tlbtn.classList.toggle('open', open);
      [...tradial.querySelectorAll('.toption')].forEach(opt => {
        opt.style.transform    = `translate(${opt._dx}px,${opt._dy}px) scale(${open ? 1 : 0})`;
        opt.style.opacity      = open ? '1' : '0';
        opt.style.pointerEvents = open ? 'auto' : 'none';
      });
    }

    tlbtn.addEventListener('click', () => setMenuOpen(!menuOpen));

    // Close when clicking outside the launcher
    document.addEventListener('click', e => {
      if (menuOpen && !document.getElementById('tlauncher').contains(e.target))
        setMenuOpen(false);
    });

    // Fan option
    toptFan.addEventListener('click', () => {
      if (activeTool === 'fan') {
        // Deactivate fan
        activeTool = null;
        toptFan.classList.remove('active');
        fanWidget.style.display = 'none';
        if (fanOn) fanBtn.click();          // turn fan off if running
      } else {
        activeTool = 'fan';
        toptFan.classList.add('active');
        fanWidget.style.display = '';       // show fan widget
      }
      setMenuOpen(false);
    });

    // Seed example tasks
    ['Buy groceries', 'Read for 30 minutes', 'Go for a walk']
      .forEach(t => { input.value = t; addTask(); });
  </script>
</body>
</html>
