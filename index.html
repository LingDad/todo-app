<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly To-do</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23f5f4f0'/%3E%3Ccircle cx='30' cy='34' r='15' fill='none' stroke='%231a1a1a' stroke-width='4.5'/%3E%3Cpath d='M22 34.5l5.5 5.5L39 28.5' fill='none' stroke='%231a1a1a' stroke-width='4.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='47' cy='19' r='10' fill='%23c8aa6a'/%3E%3Cpath d='M47 14.5v5l3 2' fill='none' stroke='%23fffdf7' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f5f4f0;
      font-family: 'Georgia', serif;
      display: flex;
      justify-content: center;
      padding: 60px 16px 120px;
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: 520px;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 2rem;
      font-weight: normal;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }

    .export-btn {
      flex-shrink: 0;
      padding: 9px 12px;
      border: 1px solid #d0cfc9;
      border-radius: 8px;
      background: #fff;
      color: #1a1a1a;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .export-btn:hover {
      border-color: #888;
      background: #faf9f4;
    }

    /* Input */
    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    .add-row input {
      flex: 1;
      padding: 12px 16px;
      font-size: 1rem;
      font-family: inherit;
      border: 1.5px solid #d0cfc9;
      border-radius: 8px;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
      color: #1a1a1a;
    }
    .add-row input:focus { border-color: #888; }
    .add-row input::placeholder { color: #aaa; }

    .add-btn {
      padding: 12px 20px;
      font-size: 1.4rem;
      line-height: 1;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .add-btn:hover { background: #333; }

    /* List */
    .todo-list { list-style: none; }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #e5e4df;
      animation: fadeIn 0.25s ease;
      flex-wrap: wrap;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Custom checkbox */
    .todo-item input[type="checkbox"] { display: none; }

    .check-box {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border: 1.5px solid #c0bfba;
      border-radius: 50%;
      cursor: pointer;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .check-box:hover { border-color: #888; }
    .check-box.checked {
      background: #1a1a1a;
      border-color: #1a1a1a;
    }
    .check-box.checked::after {
      content: '';
      width: 6px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .todo-text {
      font-size: 1.05rem;
      color: #1a1a1a;
      line-height: 1.5;
      word-break: break-word;
      user-select: none;
    }

    .todo-content {
      flex: 1;
      min-width: 0;
    }

    .subtask-list {
      margin-top: 8px;
      margin-left: 0;
      color: #5f584e;
      font-size: 0.92rem;
      line-height: 1.45;
      list-style: none;
    }
    .subtask-list:empty {
      display: none;
    }
    .subtask-list li + li {
      margin-top: 4px;
    }
    .subtask-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .subtask-check {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      border: 1.4px solid #c0bfba;
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .subtask-check.checked {
      background: #1a1a1a;
      border-color: #1a1a1a;
    }
    .subtask-check.checked::after {
      content: '';
      width: 4px;
      height: 7px;
      border: 1.6px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }
    .subtask-text.done {
      color: #8a867d;
      text-decoration: line-through;
    }

    .edit-btn {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: 1px solid #d0cfc9;
      border-radius: 8px;
      background: #fff;
      color: #5b554c;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: -3px;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .edit-btn:hover,
    .edit-btn.active {
      border-color: #888;
      color: #1a1a1a;
      background: #faf9f4;
    }

    .edit-panel {
      width: calc(100% - 34px);
      margin-left: 34px;
      display: none;
      gap: 8px;
      padding: 10px 0 2px;
    }
    .todo-item.edit-open .edit-panel {
      display: grid;
    }
    .edit-panel input,
    .edit-panel textarea {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #d0cfc9;
      border-radius: 8px;
      background: #fff;
      color: #1a1a1a;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }
    .edit-panel textarea {
      min-height: 104px;
      resize: vertical;
    }
    .edit-panel .field-label {
      font-size: 0.78rem;
      color: #6f675b;
      line-height: 1.2;
    }
    .edit-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .edit-actions button {
      padding: 8px 12px;
      border: 1px solid #d0cfc9;
      border-radius: 8px;
      background: #fff;
      color: #1a1a1a;
      cursor: pointer;
      font-family: inherit;
    }
    .edit-actions .save-edit {
      background: #1a1a1a;
      border-color: #1a1a1a;
      color: #fff;
    }

    /* Falling letters */
    .falling-letter {
      position: fixed;
      pointer-events: none;
      font-family: 'Georgia', serif;
      font-size: 1.05rem;
      color: #1a1a1a;
      line-height: 1;
      transform-origin: center center;
      z-index: 9999;
      user-select: none;
    }

    /* ── Vintage desk fan ──────────────────────────────────── */
    .fan-widget {
      position: fixed;
      bottom: 0;
      right: 18px;
      z-index: 9998;
      user-select: none;
      /* NOTE: no filter here — filter creates a stacking context that flattens 3-D children */
      perspective: 380px;
      transform-style: preserve-3d;
    }
    /* The head (SVG) pivots at the neck — transform-origin at bottom centre */
    .fan-head-wrap {
      position: relative;
      transform-origin: 50% 100%;
      transform: rotateY(0deg);
      transform-style: preserve-3d;
    }
    /* Housing depth: circular slab behind the face, visible when rotated */
    .fan-head-wrap::before {
      content: '';
      position: absolute;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: radial-gradient(circle at 42% 36%, #b0a070, #604e32, #2a1c0e);
      top: 0; left: 0;
      transform: translateZ(-13px);
      pointer-events: none;
    }
    .fan-face {
      display: block;
      margin: 0 auto;
      filter: drop-shadow(2px 8px 13px rgba(0,0,0,0.44));
    }

    /* Blade spin — duration is adjusted by JS for spin-up / spin-down */
    @keyframes fanSpin { to { transform: rotate(360deg); } }
    #bladesGroup {
      transform-box: fill-box;
      transform-origin: center;
    }

    .fan-neck {
      width: 18px;
      height: 22px;
      background: linear-gradient(90deg, #caba90 0%, #8a7860 48%, #c2b288 100%);
      margin: -1px auto 0;
      clip-path: polygon(18% 0%, 82% 0%, 94% 100%, 6% 100%);
    }
    .fan-base {
      width: 108px;
      height: 33px;
      background: linear-gradient(180deg, #ccba96 0%, #a88e6c 55%, #8c7256 100%);
      border-radius: 17px;
      margin: 0 auto;
      position: relative;
      box-shadow:
        0 6px 16px rgba(0,0,0,0.50),
        inset 0 1px 0 rgba(255,242,210,0.42),
        inset 0 -3px 7px rgba(0,0,0,0.24);
    }
    .fan-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 21px;
      height: 21px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 33%, #cc3828, #7c0e18);
      border: 2px solid #4e080e;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.62), inset 0 1px 0 rgba(255,150,130,0.45);
      transition: transform 0.08s, box-shadow 0.08s;
      outline: none;
    }
    .fan-btn:hover { filter: brightness(1.12); }
    .fan-btn:active {
      transform: translateY(calc(-50% + 2px));
      box-shadow: 0 1px 2px rgba(0,0,0,0.6), inset 0 2px 5px rgba(0,0,0,0.42);
    }
    .fan-btn.on {
      background: radial-gradient(circle at 38% 33%, #4ed824, #168010);
      border-color: #0a5008;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5),
                  0 0 11px rgba(78,218,36,0.70),
                  inset 0 1px 0 rgba(160,255,110,0.55);
    }
    .fan-label {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Georgia', serif;
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      color: rgba(60,45,28,0.65);
      pointer-events: none;
    }

    /* Mobile: scale the whole fan down, anchored to bottom-right corner */
    @media (max-width: 640px) {
      .fan-widget {
        transform: scale(0.62);
        transform-origin: bottom right;
      }
    }

    /* FAB hides when a tool is active */
    .tlauncher { transition: opacity 0.22s, transform 0.22s; }
    .tlauncher.tool-hidden { opacity: 0; pointer-events: none; transform: scale(0.7); }

    /* ── Tool Launcher & Radial Menu ──────────────────────────────── */
    .tlauncher {
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 9999;
      user-select: none;
    }

    /* Main FAB button */
    .tlbtn {
      position: relative;
      z-index: 1;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #1a1a1a;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 18px rgba(0,0,0,0.42);
      color: #fff;
      outline: none;
      transition: background 0.18s, transform 0.26s cubic-bezier(0.34,1.56,0.64,1);
    }
    .tlbtn:hover   { background: #333; }
    .tlbtn.open    { transform: rotate(45deg); background: #3c3c3c; }

    /* Zero-size container centred on the FAB */
    .tradial {
      position: absolute;
      bottom: 26px;
      right: 26px;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    /* Individual tool option */
    .toption {
      position: absolute;
      width: 44px;
      height: 44px;
      margin: -22px;          /* centres the button on tradial's origin */
      border-radius: 50%;
      background: #242424;
      border: 2px solid #484848;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 14px rgba(0,0,0,0.48);
      color: #bbb;
      outline: none;
      pointer-events: none;
      transform: scale(0);    /* closed: collapsed on FAB centre */
      opacity: 0;
      transition: transform 0.30s cubic-bezier(0.34,1.56,0.64,1),
                  opacity   0.22s,
                  background 0.15s,
                  border-color 0.15s,
                  color 0.15s;
    }
    .toption:hover  { background: #363636; border-color: #666; color: #fff; }
    .toption.active { border-color: #c8aa6a; background: #221b0e; color: #e8c87a; }

    /* Label tooltip */
    .toption::after {
      content: attr(data-label);
      position: absolute;
      right: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      white-space: nowrap;
      font-family: 'Georgia', serif;
      font-size: 0.68rem;
      letter-spacing: 0.04em;
      color: #eee;
      background: rgba(0,0,0,0.76);
      padding: 4px 9px;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.14s;
    }
    .toption:hover::after { opacity: 1; }

    @media (max-width: 640px) {
      .tlauncher {
        transform: scale(0.75);
        transform-origin: bottom right;
      }
    }

    /* ── Vacuum Cleaner Widget ─────────────────────────────────── */
    .vacuum-widget {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9997;
      user-select: none;
      pointer-events: none;
    }
    .vacuum-widget svg {
      width: 100%;
      height: 100%;
    }
    #vacBtn { cursor: pointer; pointer-events: all; }

    /* Nozzle suction glow — pulses when vacuum is on */
    @keyframes vacPulse {
      from { opacity: 0.10; r: 18px; }
      to   { opacity: 0.80; r: 26px; }
    }
    .vacuum-widget.vac-on #vacNozzleGlow {
      animation: vacPulse 0.38s ease-in-out infinite alternate;
    }

    /* ── Tornado Widget ─────────────────────────────────────── */
    .tornado-widget {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9990;
      user-select: none;
      pointer-events: none;
    }
    .tor-core {
      position: absolute;
      width: 240px;
      height: 340px;
      pointer-events: auto;
      cursor: grab;
      touch-action: none;
      /* shift up so the element covers cloud-top to tip */
      transform: translate(-50%, -75%);
      background: transparent;
      border: none;
    }
    .tor-core:active { cursor: grabbing; }
    #torCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    /* ── Trash Bin ───────────────────────────────────────────── */
    .trash-widget {
      position: fixed;
      bottom: 0;
      right: 14px;
      z-index: 9995;
      pointer-events: none;
      user-select: none;
    }
    #trashLid {
      transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1);
    }
    .trash-widget.tor-on #trashLid {
      transform: translateY(-10px);
    }
    .trash-widget.trash-gulp #trashLid {
      transform: translateY(-18px);
    }

    .tor-btn {
      position: absolute;
      left: 50%;
      top: calc(100% + 14px);
      transform: translateX(-50%);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 33%, #cc3828, #7c0e18);
      border: 2px solid #4e080e;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 2px 6px rgba(0,0,0,0.62), inset 0 1px 0 rgba(255,150,130,0.45);
      outline: none;
      transition: box-shadow 0.08s;
    }
    .tor-btn:hover { filter: brightness(1.12); }
    .tor-btn:active {
      box-shadow: 0 1px 2px rgba(0,0,0,0.6), inset 0 2px 5px rgba(0,0,0,0.42);
    }
    .tor-btn.on {
      background: radial-gradient(circle at 38% 33%, #4ed824, #168010);
      border-color: #0a5008;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5),
                  0 0 11px rgba(78,218,36,0.70),
                  inset 0 1px 0 rgba(160,255,110,0.55);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="app-header">
      <h1>Weekly To-do</h1>
      <button class="export-btn" id="exportWeeklyBtn" type="button">导出 weekly task</button>
    </div>
    <div class="add-row">
      <input type="text" id="taskInput" placeholder="Add a task…" maxlength="120" />
      <button class="add-btn" id="addBtn" title="Add">+</button>
    </div>
    <ul class="todo-list" id="todoList"></ul>
  </div>

  <!-- ── Vintage desk fan ──────────────────────────────────── -->
  <div class="fan-widget" id="fanWidget" style="display:none">
    <div class="fan-head-wrap" id="fanHead">
    <svg class="fan-face" viewBox="0 0 110 110" width="130" height="130" aria-hidden="true">
      <defs>
        <radialGradient id="housingGrad" cx="40%" cy="34%" r="64%">
          <stop offset="0%"   stop-color="#e4d4b4"/>
          <stop offset="52%"  stop-color="#b09878"/>
          <stop offset="100%" stop-color="#7a6448"/>
        </radialGradient>
        <linearGradient id="bladeGrad" x1="22%" y1="0%" x2="78%" y2="100%">
          <stop offset="0%"   stop-color="#d2c29e"/>
          <stop offset="44%"  stop-color="#a89272"/>
          <stop offset="100%" stop-color="#6e5a46"/>
        </linearGradient>
        <radialGradient id="hubGrad" cx="38%" cy="33%" r="68%">
          <stop offset="0%"   stop-color="#caba94"/>
          <stop offset="100%" stop-color="#36261a"/>
        </radialGradient>
        <clipPath id="bladeClip">
          <circle cx="55" cy="55" r="52"/>
        </clipPath>
        <filter id="bladeShadow" x="-10%" y="-10%" width="120%" height="120%">
          <feDropShadow dx="1" dy="1.5" stdDeviation="1.5" flood-opacity="0.30"/>
        </filter>
      </defs>

      <!-- Motor-housing back plate -->
      <circle cx="55" cy="55" r="53" fill="url(#housingGrad)" stroke="#5a4634" stroke-width="1"/>

      <!-- Rotating blades — JS sets animation-name / animation-duration inline -->
      <g id="bladesGroup" clip-path="url(#bladeClip)" filter="url(#bladeShadow)">
        <path fill="url(#bladeGrad)" opacity="0.92"
          d="M52 46 C44 30 38 18 36 10 C44 2 66 4 68 12 C72 24 64 36 58 46 Z"/>
        <path fill="url(#bladeGrad)" opacity="0.92" transform="rotate(90 55 55)"
          d="M52 46 C44 30 38 18 36 10 C44 2 66 4 68 12 C72 24 64 36 58 46 Z"/>
        <path fill="url(#bladeGrad)" opacity="0.92" transform="rotate(180 55 55)"
          d="M52 46 C44 30 38 18 36 10 C44 2 66 4 68 12 C72 24 64 36 58 46 Z"/>
        <path fill="url(#bladeGrad)" opacity="0.92" transform="rotate(270 55 55)"
          d="M52 46 C44 30 38 18 36 10 C44 2 66 4 68 12 C72 24 64 36 58 46 Z"/>
      </g>

      <!-- Wire cage — drawn in front of blades -->
      <g clip-path="url(#bladeClip)" stroke="#8a887a" fill="none" opacity="0.80">
        <circle cx="55" cy="55" r="13"  stroke-width="1.3"/>
        <circle cx="55" cy="55" r="25"  stroke-width="1.3"/>
        <circle cx="55" cy="55" r="38"  stroke-width="1.3"/>
        <circle cx="55" cy="55" r="51"  stroke-width="1.6"/>
        <line x1="55" y1="4"  x2="55" y2="106" stroke-width="1.1"/>
        <line x1="4"  y1="55" x2="106" y2="55"  stroke-width="1.1"/>
        <line x1="18" y1="18" x2="92"  y2="92"  stroke-width="1.1"/>
        <line x1="92" y1="18" x2="18"  y2="92"  stroke-width="1.1"/>
        <line x1="16" y1="37" x2="94"  y2="73"  stroke-width="0.9"/>
        <line x1="37" y1="16" x2="73"  y2="94"  stroke-width="0.9"/>
        <line x1="94" y1="37" x2="16"  y2="73"  stroke-width="0.9"/>
        <line x1="73" y1="16" x2="37"  y2="94"  stroke-width="0.9"/>
      </g>

      <!-- Hub cap -->
      <circle cx="55" cy="55" r="12" fill="url(#hubGrad)" stroke="#2c1c10" stroke-width="1.5"/>
      <circle cx="55" cy="55" r="5"  fill="#1e1008"/>

      <!-- Outer rim + upper-left highlight arc -->
      <circle cx="55" cy="55" r="53" fill="none" stroke="#6a5440" stroke-width="3"/>
      <path d="M22 28 A42 42 0 0 1 55 4" stroke="rgba(228,210,172,0.55)"
            stroke-width="3" fill="none" stroke-linecap="round"/>
    </svg>
    </div><!-- /.fan-head-wrap -->

    <div class="fan-neck"></div>
    <div class="fan-base">
      <span class="fan-label">FAN</span>
      <button class="fan-btn" id="fanBtn" aria-label="Fan power toggle"></button>
    </div>
  </div>

  <!-- ── Vacuum Cleaner ───────────────────────────────────── -->
  <div class="vacuum-widget" id="vacuumWidget" style="display:none">
    <svg id="vacSvg" xmlns="http://www.w3.org/2000/svg" overflow="visible" aria-hidden="true">
      <defs>
        <radialGradient id="vbg" cx="35%" cy="28%" r="68%">
          <stop offset="0%"   stop-color="#e6d8b8"/>
          <stop offset="52%"  stop-color="#b09060"/>
          <stop offset="100%" stop-color="#6e4e2a"/>
        </radialGradient>
        <radialGradient id="vwg" cx="36%" cy="32%" r="67%">
          <stop offset="0%"  stop-color="#8a7050"/>
          <stop offset="100%" stop-color="#2a1808"/>
        </radialGradient>
        <radialGradient id="vboff" cx="38%" cy="33%" r="68%">
          <stop offset="0%"   stop-color="#cc3828"/>
          <stop offset="100%" stop-color="#7c0e18"/>
        </radialGradient>
        <radialGradient id="vbon" cx="38%" cy="33%" r="68%">
          <stop offset="0%"   stop-color="#4ed824"/>
          <stop offset="100%" stop-color="#168010"/>
        </radialGradient>
        <filter id="vShadow">
          <feDropShadow dx="2" dy="5" stdDeviation="6" flood-opacity="0.45"/>
        </filter>
      </defs>

      <!-- All geometry is drawn by buildVacSvg() in JS, so elements are placed here as targets -->
      <g id="vacHoseGroup">
        <path id="vacHoseShadow" fill="none" stroke="rgba(0,0,0,0.28)" stroke-linecap="round"/>
        <path id="vacHoseOuter"  fill="none" stroke="#28140a" stroke-linecap="round" stroke-dasharray="13,6"/>
        <path id="vacHoseSheen"  fill="none" stroke="#7a5c3c" stroke-linecap="round" stroke-dasharray="5,14" stroke-dashoffset="4"/>
        <path id="vacHoseInner"  fill="none" stroke="#100806" stroke-linecap="round" opacity="0.6"/>
      </g>

      <!-- Nozzle group — positioned by JS -->
      <g id="vacNozzleGroup" filter="url(#vShadow)">
        <rect id="vacNozzleShadow" rx="5" fill="rgba(0,0,0,0.30)"/>
        <rect id="vacNozzleBody"   rx="5" fill="#281808" stroke="#180c06" stroke-width="1.5"/>
        <rect id="vacNozzleSheen"  rx="3" fill="rgba(200,158,86,0.18)"/>
        <rect id="vacNozzleMouth"  rx="2" fill="#0c0806"/>
        <circle id="vacNozzleGlow" fill="#a8d8ff" opacity="0"/>
        <circle id="vacNozzleCollar1" fill="#1a0e06" stroke="#0c0806" stroke-width="1.2"/>
        <circle id="vacNozzleCollar2" fill="#100806"/>
      </g>

      <!-- Body group — positioned by JS -->
      <g id="vacBodyGroup" filter="url(#vShadow)">
        <!-- Wheels -->
        <circle id="vacWheel1" fill="url(#vwg)"/>
        <circle id="vacWheel2" fill="url(#vwg)"/>
        <circle id="vacAxle1"  fill="#0e0806" opacity="0.7"/>
        <circle id="vacAxle2"  fill="#0e0806" opacity="0.7"/>
        <!-- Body shadow -->
        <rect id="vacBodyShadow" rx="27" fill="rgba(0,0,0,0.22)"/>
        <!-- Body -->
        <rect id="vacBody" rx="27" fill="url(#vbg)" stroke="#5c3e1e" stroke-width="1.5"/>
        <rect id="vacBodySheen" rx="15" fill="rgba(240,222,182,0.22)"/>
        <!-- Vents -->
        <g id="vacVents" stroke="#7a5e30" stroke-width="1.3" stroke-linecap="round" opacity="0.42"/>
        <!-- Label -->
        <rect id="vacLabelBg" rx="4" fill="#8a6838" opacity="0.55"/>
        <text id="vacLabelTxt" font-family="Georgia,serif" fill="#e8d090"
              text-anchor="middle" letter-spacing="1.5" opacity="0.9">VAC</text>
        <!-- Port -->
        <circle id="vacPort1" fill="#201008" stroke="#140a04" stroke-width="1.2"/>
        <circle id="vacPort2" fill="#0e0806"/>
        <!-- Power button -->
        <circle id="vacBtn" fill="url(#vboff)" stroke="#3e0812" stroke-width="2" style="pointer-events:all;cursor:pointer"/>
        <circle id="vacBtnRing" fill="none" stroke="rgba(255,180,150,0.18)" stroke-width="2.5"/>

  </div>

  <!-- ── Trash Bin ───────────────────────────────────────── -->

  <!-- ── Tool Launcher ─────────────────────────────────────── -->
  <div class="tlauncher" id="tlauncher">

          <ellipse cx="9"  cy="19" rx="1.8" ry="1.1" opacity="0.60"/>
          <line x1="9" y1="21" x2="9.4" y2="23" stroke="currentColor" stroke-width="1.4"

    <!-- FAB -->
    <button class="tlbtn" id="tlbtn" aria-label="Tools">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none"
           stroke-width="2.6" stroke-linecap="round" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5"  y1="12" x2="19" y2="12"/>
